<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUNSON TYPING QUEST</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700&family=DotGothic16&family=Sawarabi+Gothic&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-color: #00f2ff;
            --bg-color: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.9);
            --font-main: 'M PLUS 1p', sans-serif;
            --glow: 0 0 10px var(--main-color), 0 0 20px var(--main-color);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: var(--font-main);
            overflow: hidden;
            transition: background 0.5s;
        }

        /* 共通：角ばったネオンデザイン */
        .square-border {
            border: 2px solid var(--main-color);
            box-shadow: var(--glow), inset 0 0 10px var(--main-color);
            background: var(--panel-bg);
        }

        /* ヘッダー情報 */
        #top-status-bar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 30px;
            z-index: 1000;
        }

        .status-unit {
            text-align: right;
        }

        .xp-container {
            width: 200px;
            height: 12px;
            background: #222;
            border: 1px solid var(--main-color);
            margin-top: 5px;
        }

        #xp-fill {
            height: 100%;
            background: var(--main-color);
            box-shadow: var(--glow);
            width: 0%;
            transition: width 0.4s;
        }

        /* 画面制御 */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            padding: 50px;
        }

        .screen.active { display: flex; }

        /* タイトルとボタン */
        h1 {
            font-size: 4.5rem;
            margin-bottom: 40px;
            text-shadow: var(--glow);
            letter-spacing: 5px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 15px;
        }

        .btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--main-color);
            color: var(--main-color);
            padding: 20px 60px;
            font-size: 1.4rem;
            cursor: pointer;
            text-shadow: var(--glow);
            box-shadow: var(--glow);
            transition: 0.2s;
            text-transform: uppercase;
            min-width: 320px;
        }

        .btn:hover {
            background: var(--main-color);
            color: #000;
            box-shadow: 0 0 30px var(--main-color);
        }

        /* ゲーム表示 */
        #word-area {
            text-align: center;
            padding: 40px;
            min-width: 80%;
        }

        #display-ja {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #display-ro {
            font-size: 2.2rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.4);
        }

        .char-done { color: var(--main-color); text-shadow: var(--glow); }

        #stats {
            display: flex;
            gap: 100px;
            margin-top: 50px;
            font-size: 2rem;
        }

        /* 特殊効果 */
        #paint-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 255, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 5000;
            transition: opacity 1.5s;
        }

        #thunder-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            pointer-events: none;
            opacity: 0;
            z-index: 5000;
        }

        /* ショップのタブバー */
        .tab-bar {
            display: flex;
            margin-bottom: 20px;
            gap: 0;
        }

        .tab-btn {
            border: 2px solid var(--main-color);
            background: none;
            color: var(--main-color);
            padding: 10px 30px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--main-color);
            color: #000;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-height: 50vh;
            overflow-y: auto;
            padding: 20px;
        }

        .skill-item {
            padding: 20px;
            border: 1px solid var(--main-color);
            text-align: left;
        }

        /* フィーバー演出 */
        @keyframes rainbow-bg {
            0% { border-color: red; box-shadow: 0 0 20px red; }
            20% { border-color: yellow; box-shadow: 0 0 20px yellow; }
            40% { border-color: green; box-shadow: 0 0 20px green; }
            60% { border-color: blue; box-shadow: 0 0 20px blue; }
            80% { border-color: violet; box-shadow: 0 0 20px violet; }
            100% { border-color: red; box-shadow: 0 0 20px red; }
        }
        .fever-mode { animation: rainbow-bg 0.5s linear infinite !important; }

        /* ミニゲーム用バー */
        #timing-box {
            display: none;
            position: fixed;
            top: 60%;
            width: 500px;
            height: 40px;
            background: #000;
            border: 2px solid #fff;
            z-index: 2000;
        }
        #timing-cursor {
            position: absolute;
            width: 4px;
            height: 100%;
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }
        .zone { position: absolute; height: 100%; top: 0; }

        /* デザインテーマ設定 */
        .classic-theme { border-radius: 0; --main-color: #ffd700; filter: contrast(1.2); }
        .old-theme { --bg-color: #050505; --main-color: #00ff00; font-family: 'Courier New', monospace; filter: brightness(0.7); }
        .dot-theme { font-family: 'DotGothic16', sans-serif !important; }

    </style>
</head>
<body>

    <div id="paint-overlay"></div>
    <div id="thunder-flash"></div>

    <div id="top-status-bar">
        <div class="status-unit">
            <div>LV <span id="val-lv">1</span></div>
            <div class="xp-container"><div id="xp-fill"></div></div>
        </div>
        <div class="status-unit" style="font-size: 1.5rem;">
            🪙 <span id="val-coins">0</span>
        </div>
    </div>

    <div id="scr-home" class="screen active">
        <h1>BUNSON TYPING</h1>
        <div class="menu-grid">
            <button class="btn" onclick="nav('scr-diff')">PLAY</button>
            <button class="btn" onclick="startStoryMode()">STORY MODE</button>
            <button class="btn" onclick="nav('scr-ranking')">RANKING</button>
            <button class="btn" onclick="openShop()">SKILL SHOP</button>
            <button class="btn" onclick="nav('scr-settings')">SETTINGS</button>
        </div>
    </div>

    <div id="scr-diff" class="screen">
        <h2>SELECT DIFFICULTY</h2>
        <div class="menu-grid">
            <button class="btn" onclick="initGame('easy')">初級 (EASY)</button>
            <button class="btn" onclick="initGame('normal')">中級 (NORMAL)</button>
            <button class="btn" onclick="initGame('hard')">上級 (HARD)</button>
            <button class="btn" onclick="nav('scr-home')">BACK</button>
        </div>
    </div>

    <div id="scr-game" class="screen">
        <div id="info-header" style="font-size: 1.5rem; color: var(--main-color); margin-bottom: 20px;"></div>
        <div id="game-timer" style="font-size: 3rem; margin-bottom: 20px;">60.00</div>
        
        <div id="word-area" class="square-border">
            <div id="display-ja">---</div>
            <div id="display-ro">---</div>
        </div>

        <div id="stats">
            <div>SCORE: <span id="stat-score">0</span></div>
            <div>COMBO: <span id="stat-combo">0</span></div>
        </div>

        <div id="skill-slot" style="margin-top: 30px; font-size: 1.2rem;">
            EQUIPPED: <span id="equipped-name">NONE</span> 
            <span id="skill-ready-hint" style="color: yellow; display: none;">[ SPACE TO USE ]</span>
        </div>

        <div id="timing-box">
            <div id="timing-cursor"></div>
        </div>
    </div>

    <div id="scr-result" class="screen">
        <h2 style="font-size: 3rem; text-shadow: var(--glow);">MISSION COMPLETE</h2>
        <div class="square-border" style="padding: 40px; min-width: 400px; text-align: center; font-size: 1.5rem;">
            <p>SCORE: <span id="res-score">0</span></p>
            <p>COINS: +<span id="res-coins">0</span></p>
            <p>XP: +<span id="res-xp">0</span></p>
            <p id="res-story-status" style="color: yellow;"></p>
        </div>
        <button class="btn" onclick="nav('scr-home')" style="margin-top: 30px;">RETURN TO HOME</button>
    </div>

    <div id="scr-shop" class="screen">
        <h2>SKILL SYSTEM</h2>
        <div class="tab-bar">
            <button id="tab-buy" class="tab-btn active" onclick="switchShopTab('buy')">BUY SKILLS</button>
            <button id="tab-equip" class="tab-btn" onclick="switchShopTab('equip')">EQUIPMENT</button>
        </div>
        <div id="shop-container" class="item-grid square-border">
            </div>
        <button class="btn" onclick="nav('scr-home')" style="margin-top: 20px;">BACK</button>
    </div>

    <div id="scr-settings" class="screen">
        <h2>SYSTEM SETTINGS</h2>
        <div class="square-border" style="padding: 40px; min-width: 500px; display: flex; flex-direction: column; gap: 20px;">
            <div>VOLUME: <input type="range" id="set-vol" min="0" max="100" value="50"></div>
            <div>DESIGN: 
                <select id="set-theme">
                    <option value="neon">NEON (SQUARE)</option>
                    <option value="classic">CLASSIC (LEGO)</option>
                    <option value="old">OLD CLASSIC</option>
                    <option value="dot">DOT STYLE</option>
                </select>
            </div>
            <div>COLOR: 
                <select id="set-color">
                    <option value="cyan">CYAN (DEFAULT)</option>
                    <option value="red">RED</option>
                    <option value="yellow">YELLOW</option>
                    <option value="magenta">MAGENTA</option>
                    <option value="rainbow">RAINBOW</option>
                </select>
            </div>
            <div>FONT: 
                <select id="set-font">
                    <option value="normal">NORMAL (ROUND)</option>
                    <option value="gothic">GOTHIC</option>
                    <option value="chara">CHARA (VERY ROUND)</option>
                    <option value="dot">DOT</option>
                    <option value="super">SUPER CLASSIC</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="applySettings()" style="margin-top: 30px;">SAVE & EXIT</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

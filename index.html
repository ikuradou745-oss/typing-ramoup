<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>デッキカードタイピング RPG - 完全版</title>
    <style>
        /* ==========================================
           全体のリセットと基本スタイル
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: #ffffff;
            overflow-x: hidden;
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header-info {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 14px;
            border: 2px solid #0f3460;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #aaa;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            padding: 0;
            font-size: 18px;
            box-shadow: none;
        }
        .settings-btn:hover {
            transform: rotate(90deg) scale(1.1);
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .screen {
            display: none;
            width: 100%;
            flex-grow: 1;
            min-height: 100vh;
            padding: 20px;
            padding-top: 80px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-in-out;
        }
        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 48px;
            margin-bottom: 30px;
            text-align: center;
            color: #e94560;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5), 2px 2px 4px #000;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        h3 {
            font-size: 22px;
            margin-bottom: 10px;
            text-align: center;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.4), 0 8px 15px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 0 rgba(0,0,0,0.4), 0 12px 20px rgba(0,0,0,0.4);
            filter: brightness(1.1);
        }
        
        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.3);
        }

        button:disabled {
            background: #555 !important;
            box-shadow: 0 4px 0 #333 !important;
            cursor: not-allowed;
            transform: none !important;
            filter: grayscale(100%);
        }

        .btn-primary { background: linear-gradient(135deg, #e94560, #ff2e63); border: 2px solid #ff2e63; }
        .btn-secondary { background: linear-gradient(135deg, #0f3460, #16213e); border: 2px solid #4a90e2; }
        .btn-success { background: linear-gradient(135deg, #4caf50, #2e7d32); border: 2px solid #81c784; }
        .btn-warning { background: linear-gradient(135deg, #ff9800, #f57c00); border: 2px solid #ffb74d; }
        .btn-danger { background: linear-gradient(135deg, #f44336, #c62828); border: 2px solid #e57373; }
        .btn-purple { background: linear-gradient(135deg, #9c27b0, #6a1b9a); border: 2px solid #ba68c8; }
        .btn-dark { background: linear-gradient(135deg, #424242, #212121); border: 2px solid #757575; }
        .btn-gold { background: linear-gradient(135deg, #ffd700, #ff8c00); border: 2px solid #fffacd; color: #000; text-shadow: none; }
        .btn-teal { background: linear-gradient(135deg, #008080, #004d4d); border: 2px solid #00cccc; }
        .btn-special { background: linear-gradient(135deg, #ff6b6b, #ee5a24); border: 2px solid #feca57; box-shadow: 0 0 20px #ff9f43; }
        .btn-craft { background: linear-gradient(135deg, #8e44ad, #9b59b6); border: 2px solid #d2b4de; }
        .btn-party { background: linear-gradient(135deg, #00b894, #00a381); border: 2px solid #55efc4; }
        .btn-request { background: linear-gradient(135deg, #6c5ce7, #4a3cb5); border: 2px solid #a29bfe; }
        .btn-bug { background: linear-gradient(135deg, #fd79a8, #e17055); border: 2px solid #ff9ff3; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .menu-grid button {
            height: 90px;
            font-size: 20px;
        }

        .tab-bar-container {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .tab-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .tab-bar button {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 40px;
            background: #2a2a4a;
            box-shadow: none;
            border: 2px solid transparent;
            height: auto;
        }
        .tab-bar button.active {
            background: #e94560;
            border-color: #ff2e63;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .rarity-Common { background: linear-gradient(135deg, #808080, #555555); color: white; border: 2px solid #aaaaaa; }
        .rarity-Uncommon { background: linear-gradient(135deg, #4caf50, #2e7d32); color: white; border: 2px solid #81c784; }
        .rarity-Rare { background: linear-gradient(135deg, #2196f3, #1565c0); color: white; border: 2px solid #64b5f6; }
        .rarity-Legend { background: linear-gradient(135deg, #ffeb3b, #fbc02d); color: black; border: 2px solid #fff59d; }
        .rarity-Mythic { background: linear-gradient(135deg, #f44336, #c62828); color: white; border: 2px solid #e57373; }
        .rarity-Godly { background: linear-gradient(135deg, #9c27b0, #03a9f4); color: white; border: 2px solid #e1bee7; box-shadow: 0 0 10px #03a9f4; }
        .rarity-Volcano { background: linear-gradient(135deg, #ff0000, #ff9800); color: white; border: 2px solid #ffcc80; box-shadow: 0 0 10px #ff5722; }
        .rarity-Secret { background: linear-gradient(135deg, #000000, #424242); color: #ff0000; border: 2px solid #ffffff; box-shadow: 0 0 15px #ffffff; }
        .rarity-Ultimate { background: linear-gradient(135deg, red, orange, yellow, green, blue, indigo, violet); color: white; border: 3px solid white; box-shadow: 0 0 15px violet; }
        .rarity-OG { background: linear-gradient(135deg, gold, black, white, gold); color: white; border: 4px solid gold; box-shadow: 0 0 20px gold; font-weight: 900; }
        .rarity-Exclusive { background: linear-gradient(135deg, #ff66b2, #ffb3e6, #ff99cc); color: white; border: 3px solid #ff3399; box-shadow: 0 0 20px #ff007f; font-weight: bold; text-shadow: 1px 1px 2px #ff007f; }

        .card {
            width: 110px;
            height: 160px;
            border-radius: 10px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            z-index: 10;
            box-shadow: 0 12px 25px rgba(0,0,0,0.9);
        }
        .card-name {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 3px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
        }
        .card-type {
            font-size: 9px;
            background: rgba(0,0,0,0.6);
            padding: 2px 5px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .card-desc {
            font-size: 9px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
        }
        .card-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #e94560;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border: 2px solid #1a1a2e;
            z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            font-size: 11px;
        }

        .equipped-slot {
            width: 110px;
            height: 160px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,215,0,0.5);
            font-size: 12px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            text-align: center;
            flex-direction: column;
        }

        .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            max-height: 50vh;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            border: 2px solid #0f3460;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .equipped-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            min-height: 360px;
            padding: 12px;
            background: rgba(255,215,0,0.05);
            border: 2px dashed gold;
            border-radius: 15px;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(255,215,0,0.1);
        }
        .equip-warning, .deck-warning {
            color: #ffaa00;
            font-size: 14px;
            margin-top: 8px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #ffaa00;
            display: none;
        }
        .equip-error {
            color: #ff4444;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        #battle-screen {
            justify-content: flex-start;
            padding-top: 80px;
            padding-bottom: 20px;
        }
        .battle-header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 15px;
        }
        .status-box {
            background: rgba(0,0,0,0.8);
            padding: 12px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            border: 2px solid #0f3460;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
        }
        .boss-status-box { border-color: #e94560; }
        .player-status-box { border-color: #4caf50; }
        .status-box h3 { font-size: 18px; margin-bottom: 5px; }
        .status-box > div { font-size: 18px; }

        .hp-bar-container {
            width: 100%;
            height: 20px;
            background: #222;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
            border: 1px solid #555;
            position: relative;
        }
        .hp-bar {
            height: 100%;
            background: #e94560;
            width: 100%;
            transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .player-hp-bar { background: linear-gradient(90deg, #4caf50, #81c784); }
        .boss-hp-bar { background: linear-gradient(90deg, #c62828, #f44336); }
        .hp-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 11px;
            text-shadow: 1px 1px 1px black;
        }
        
        .shield-bar-container {
            width: 100%;
            height: 8px;
            background: #1a3a5c;
            border-radius: 4px;
            margin-top: 4px;
            overflow: hidden;
            border: 1px solid #3a7ca5;
        }
        .shield-bar {
            height: 100%;
            background: linear-gradient(90deg, #00bfff, #1e90ff);
            width: 0%;
            transition: width 0.3s;
        }

        .status-effects {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            max-width: 120px;
            justify-content: flex-end;
        }
        .effect-icon {
            background: rgba(0,0,0,0.7);
            padding: 3px 6px;
            border-radius: 12px;
            font-size: 11px;
            border: 1px solid;
            white-space: nowrap;
        }
        .effect-burn { border-color: #ff6600; color: #ffaa00; }
        .effect-freeze { border-color: #00ffff; color: #88ffff; }
        .effect-heal { border-color: #00ff88; color: #88ffbb; }
        .effect-shield { border-color: #1e90ff; color: #88ccff; }
        .effect-firegamma { border-color: #ff4500; color: #ff8c00; }
        .effect-healgama { border-color: #32cd32; color: #98fb98; }

        .typing-area {
            background: linear-gradient(180deg, rgba(15, 52, 96, 0.9), rgba(22, 33, 62, 0.9));
            border: 3px solid #4a90e2;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
            position: relative;
        }
        .japanese-text {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
            word-break: break-all;
        }
        .romaji-text {
            font-size: 20px;
            letter-spacing: 3px;
            font-family: 'Courier New', Courier, monospace;
            color: #666;
            font-weight: bold;
            word-break: break-all;
        }
        .romaji-text span.typed {
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
        }
        .romaji-text span.error {
            color: #ff3333;
            text-shadow: 0 0 10px #ff3333;
            animation: shake 0.2s ease-in-out;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            50% { transform: translateX(3px); }
            75% { transform: translateX(-3px); }
            100% { transform: translateX(0); }
        }

        .hand-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            border: 1px solid #333;
            max-width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .battle-log {
            margin-top: 15px;
            height: 90px;
            width: 100%;
            max-width: 800px;
            overflow-y: auto;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            color: #ccc;
            border: 1px solid #444;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
        }
        .battle-log p {
            margin: 3px 0;
            border-bottom: 1px solid #333;
            padding-bottom: 3px;
        }
        .battle-log p:first-child { color: #fff; font-weight: bold; }

        .center-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: #ff6600;
            font-size: 28px;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 20px;
            border: 3px solid #ff6600;
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.5);
            z-index: 2000;
            text-align: center;
            white-space: nowrap;
            animation: messageFade 1.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes messageFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }

        .gacha-result-overlay, .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 30px;
        }
        .gacha-result-overlay.active, .modal.active {
            display: flex;
            animation: fadeIn 0.3s;
        }
        .gacha-result-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            max-width: 1000px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 15px;
        }
        .modal-content {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid #e94560;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.5);
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #4a90e2; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #e94560; }

        .ice-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(0, 255, 255, 0.2), rgba(0, 255, 255, 0.2) 20px, rgba(0, 150, 200, 0.3) 20px, rgba(0, 150, 200, 0.3) 40px);
            pointer-events: none;
            z-index: 1500;
            animation: iceBlink 0.5s ease-out 2;
        }
        @keyframes iceBlink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .boss-select-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin: 15px 0;
        }
        .boss-select-item {
            background: rgba(0,0,0,0.7);
            border: 2px solid #e94560;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.2s;
        }
        .boss-select-item.locked {
            border-color: #555;
            opacity: 0.6;
            filter: grayscale(0.3);
        }
        .boss-select-item h3 { font-size: 22px; margin-bottom: 8px; }
        .boss-select-item p { font-size: 14px; color: #ccc; margin-bottom: 10px; }
        .boss-select-item button { padding: 8px 25px; font-size: 18px; }
        .boss-progress { margin-bottom: 20px; font-size: 16px; color: #ffcc00; }

        .drop-rate { font-size: 12px; color: #ffcc00; margin-top: 8px; }
        .drop-card { font-size: 11px; color: #88ff88; margin-top: 4px; }
        
        .trade-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .trade-tabs button {
            font-size: 20px;
            padding: 14px 28px;
            position: relative;
        }
        .trade-notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 3px solid white;
        }
        .trade-list {
            width: 100%;
            max-width: 1000px;
            max-height: 60vh;
            overflow-y: auto;
        }
        .trade-item {
            background: rgba(0,0,0,0.7);
            border: 2px solid #4a90e2;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .trade-item-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .trade-item-nickname {
            font-size: 20px;
            color: #ffcc00;
        }
        .trade-notification-item {
            background: rgba(0,0,0,0.8);
            border: 2px solid #ff9800;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 15px;
        }
        .notification-buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
        }
        .notification-buttons button {
            font-size: 20px;
            padding: 14px 35px;
        }
        .input-field {
            padding: 12px 18px;
            font-size: 18px;
            border-radius: 8px;
            border: 2px solid #4a90e2;
            background: #1a1a2e;
            color: white;

                    if (snap.val() === true) {

                        initialPresenceLoad = false;
                        return;
                    }
                    for (const key in data) {
                        if ((!knownOnlineUsers[key] || !knownOnlineUsers[key].online) && data[key].online) {
                            if (key !== userId) showToast(`${data[key].nickname} さんがログインしました`);

                progressSpan.innerHTML = `📊 進行状況: ${unlocked.length} / ${BOSSES.length} 体のボスを解放済み`;

                BOSSES.forEach(boss => {
                    const isUnlocked = unlocked.includes(boss.index);
                    const lockedClass = isUnlocked ? '' : 'locked';
                    container.innerHTML += `
                        <div class="boss-select-item ${lockedClass}">
                            <h3>${boss.name}</h3>
                            <p>💪 HP: ${boss.hp} | ⚔️ 攻撃力: ${boss.attack}</p>
                            <div class="drop-rate">🎴 ドロップ確率: ${boss.dropRate}</div>
                            <div class="drop-card">📇 ドロップカード: ${boss.dropCard}</div>
                            ${isUnlocked ? `<button class="btn-danger" onclick="BossBattleController.startBossBattle(${boss.index})">⚔️ 戦闘開始</button>` : `<button class="btn-dark" disabled style="opacity:0.5;">🔒 未解放</button>`}
                        </div>
                    `;
                });
            },
            openOnlineUsers: function() {
                const listDiv = document.getElementById('online-users-list');
                listDiv.innerHTML = '';
                get(ref(database, 'presence')).then((snap) => {
                    const data = snap.val() || {};
                    let html = '';
                    const now = Date.now();
                    const oneDay = 24 * 60 * 60 * 1000;
                    const usersArray = Object.entries(data).map(([uid, uinfo]) => ({uid, ...uinfo}));
                    usersArray.sort((a, b) => {
                        if (a.online === b.online) return (b.lastLogin || 0) - (a.lastLogin || 0);
                        return a.online ? -1 : 1;
                    });
                    usersArray.forEach(user => {
                        if (!user.online && user.lastLogin && (now - user.lastLogin > oneDay)) return;
                        const statusClass = user.online ? 'status-online' : 'status-offline';
                        const statusText = user.online ? 'オンライン' : 'オフライン';
                        const timeStr = user.lastLogin ? new Date(user.lastLogin).toLocaleString() : '不明';
                        html += `
                            <div class="online-user-item">
                                <div style="display: flex; align-items: center;">
                                    <span class="online-status ${statusClass}" title="${statusText}"></span>
                                    <span style="font-size: 18px; font-weight: bold; color: ${user.online ? '#fff' : '#aaa'};">${user.nickname || '不明'}</span>
                                    ${user.uid === userId ? '<span style="font-size:12px; color:#ffcc00; margin-left:10px;">(あなた)</span>' : ''}
                                </div>
                                <div style="font-size: 12px; color: #888;">
                                    最終ログイン: ${timeStr}
                                </div>
                            </div>
                        `;
                    });
                    if (!html) html = '<p style="padding: 10px; color: #aaa;">表示できるユーザーがいません。</p>';
                    listDiv.innerHTML = html;
                    document.getElementById('online-users-modal').classList.add('active');
                });
            }
        };

        // ============================================================
        //  パーティーシステム
        // ============================================================
        const PARTY_REF = ref(database, 'party');
        let partyListener = null;
        let currentPartyId = null;
        let partyMembers = [];
        let isPartyLeader = false;
        let invitePending = null; // {from, partyId}

        window.PartyController = {
            renderWaiting: function() {
                // 待機中のユーザー一覧を表示
                const listDiv = document.getElementById('party-waiting-list');
                listDiv.innerHTML = '<p style="color:#aaa;">読み込み中...</p>';
                get(ref(database, 'presence')).then((snap) => {
                    const data = snap.val() || {};
                    let html = '';
                    const now = Date.now();
                    const oneDay = 24*60*60*1000;
                    const users = Object.entries(data).filter(([uid, uinfo]) => {
                        if (uid === userId) return false;
                        if (!uinfo.online) return false;
                        if (uinfo.lastLogin && (now - uinfo.lastLogin > oneDay)) return false;
                        return true;
                    });
                    if (users.length === 0) {
                        html = '<p style="color:#aaa;">現在待機中のユーザーはいません。</p>';
                    } else {
                        users.forEach(([uid, uinfo]) => {
                            const inParty = PartyController.isUserInParty(uid);
                            const isInvitable = !inParty;
                            html += `
                                <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #333;">
                                    <span>${uinfo.nickname || '不明'}</span>
                                    ${isInvitable ? `<button class="btn-success" style="padding:4px 12px; font-size:14px;" onclick="PartyController.inviteUser('${uid}')">招待</button>` : `<span style="color:#888;">既にパーティー参加中</span>`}
                                </div>
                            `;
                        });
                    }
                    listDiv.innerHTML = html;
                });
                // 自分のパーティー状態を監視
                this.listenParty();
            },
            isUserInParty: function(uid) {
                // 簡易チェック: パーティーメンバーに含まれているか
                return partyMembers.some(m => m.uid === uid);
            },
            listenParty: function() {
                if (partyListener) off(partyListener);
                partyListener = onValue(PARTY_REF, (snap) => {
                    const data = snap.val() || {};
                    // 自分が所属しているパーティーを探す
                    let found = false;
                    for (const [partyId, party] of Object.entries(data)) {
                        if (party.members && party.members.some(m => m.uid === userId)) {
                            currentPartyId = partyId;
                            partyMembers = party.members || [];
                            isPartyLeader = party.leader === userId;
                            found = true;
                            break;
                        }
                    }
                    if (!found) {
                        currentPartyId = null;
                        partyMembers = [];
                        isPartyLeader = false;
                    }
                    this.updatePartyUI();
                    // 招待通知の表示
                    this.checkInviteNotification(data);
                });
            },
            checkInviteNotification: function(partyData) {
                // 自分宛ての招待があるかチェック
                for (const [partyId, party] of Object.entries(partyData)) {
                    if (party.invites && party.invites[userId]) {
                        const inviter = party.invites[userId].from;
                        const inviterName = knownOnlineUsers[inviter]?.nickname || '不明';
                        invitePending = { from: inviter, partyId: partyId };
                        document.getElementById('party-invite-text').textContent = `${inviterName}さんからパーティー招待が来ています！`;
                        document.getElementById('party-invite-notification').classList.add('visible');
                        return;
                    }
                }
                document.getElementById('party-invite-notification').classList.remove('visible');
                invitePending = null;
            },
            updatePartyUI: function() {
                const listDiv = document.getElementById('party-member-list-content');
                const memberList = document.getElementById('party-member-list');
                const adventureBtn = document.getElementById('party-adventure-btn');
                if (currentPartyId) {
                    memberList.classList.add('visible');
                    let html = '';
                    partyMembers.forEach(m => {
                        const isLeader = m.uid === isPartyLeader;
                        html += `<div class="party-member-item"><span>${m.nickname || '不明'} ${isLeader ? '👑' : ''}</span></div>`;
                    });
                    listDiv.innerHTML = html;
                    // リーダーかつ2人以上で冒険ボタン有効
                    if (isPartyLeader && partyMembers.length >= 2) {
                        adventureBtn.disabled = false;
                    } else {
                        adventureBtn.disabled = true;
                    }
                    document.getElementById('party-status-msg').textContent = `パーティー状態: ${partyMembers.length}人 (リーダー: ${isPartyLeader ? 'あなた' : '他者'})`;
                } else {
                    memberList.classList.remove('visible');
                    adventureBtn.disabled = true;
                    document.getElementById('party-status-msg').textContent = 'パーティーに参加していません。';
                }
            },
            inviteUser: function(uid) {
                if (!currentPartyId) {
                    // 新規パーティー作成
                    const newPartyRef = push(PARTY_REF);
                    const partyId = newPartyRef.key;
                    const inviteData = {
                        leader: userId,
                        members: [{ uid: userId, nickname: window.playerData.nickname }],
                        invites: { [uid]: { from: userId, timestamp: Date.now() } },
                        createdAt: Date.now()
                    };
                    set(newPartyRef, inviteData).then(() => {
                        showCenterMessage(`${knownOnlineUsers[uid]?.nickname || '相手'} を招待しました`, "#00ffcc");
                    });
                } else {
                    // 既存パーティーに招待追加
                    if (!isPartyLeader) {
                        alert("リーダーのみ招待できます");
                        return;
                    }
                    if (partyMembers.length >= 4) {
                        alert("パーティーは最大4人です");
                        return;
                    }
                    const inviteRef = ref(database, `party/${currentPartyId}/invites/${uid}`);
                    set(inviteRef, { from: userId, timestamp: Date.now() }).then(() => {
                        showCenterMessage(`${knownOnlineUsers[uid]?.nickname || '相手'} を招待しました`, "#00ffcc");
                    });
                }
            },
            acceptInvite: function() {
                if (!invitePending) return;
                const { partyId, from } = invitePending;
                // パーティーに参加
                const memberRef = ref(database, `party/${partyId}/members`);
                get(memberRef).then((snap) => {
                    const members = snap.val() || [];
                    if (members.some(m => m.uid === userId)) {
                        alert("既に参加しています");
                        document.getElementById('party-invite-notification').classList.remove('visible');
                        invitePending = null;
                        return;
                    }
                    if (members.length >= 4) {
                        alert("パーティーが満員です");
                        document.getElementById('party-invite-notification').classList.remove('visible');
                        invitePending = null;
                        return;
                    }
                    const newMember = { uid: userId, nickname: window.playerData.nickname };
                    members.push(newMember);
                    set(memberRef, members);
                    // 招待削除
                    remove(ref(database, `party/${partyId}/invites/${userId}`));
                    document.getElementById('party-invite-notification').classList.remove('visible');
                    invitePending = null;
                    showCenterMessage("パーティーに参加しました！", "#00ffcc");
                });
            },
            rejectInvite: function() {
                if (!invitePending) return;
                const { partyId } = invitePending;
                remove(ref(database, `party/${partyId}/invites/${userId}`));
                document.getElementById('party-invite-notification').classList.remove('visible');
                invitePending = null;
                showCenterMessage("招待を拒否しました", "#ff6666");
            },
            leaveParty: function() {
                if (!currentPartyId) return;
                if (!confirm("パーティーを退出しますか？")) return;
                const membersRef = ref(database, `party/${currentPartyId}/members`);
                get(membersRef).then((snap) => {
                    let members = snap.val() || [];
                    members = members.filter(m => m.uid !== userId);
                    if (members.length === 0) {
                        // パーティー削除
                        remove(ref(database, `party/${currentPartyId}`));
                    } else {
                        set(membersRef, members);
                        // リーダーが抜けた場合、新しいリーダーを設定
                        const leaderRef = ref(database, `party/${currentPartyId}/leader`);
                        get(leaderRef).then((lsnap) => {
                            if (lsnap.val() === userId && members.length > 0) {
                                set(leaderRef, members[0].uid);
                            }
                        });
                    }
                    currentPartyId = null;
                    partyMembers = [];
                    isPartyLeader = false;
                    this.updatePartyUI();
                    showCenterMessage("パーティーを退出しました", "#ffaa00");
                });
            },
            showAdventureSelect: function() {
                if (!isPartyLeader) {
                    alert("リーダーのみ選択できます");
                    return;
                }
                if (partyMembers.length < 2) {
                    alert("2人以上集まってからです");
                    return;
                }
                const div = document.getElementById('party-adventure-select');
                div.style.display = 'flex';
            },
            toggleChat: function() {
                const chat = document.getElementById('party-chat');
                chat.classList.toggle('visible');
                if (chat.classList.contains('visible')) {
                    this.loadChatMessages();
                }
            },
            toggleVisibility: function() {
                const list = document.getElementById('party-member-list');
                list.classList.toggle('visible');
            },
            loadChatMessages: function() {
                if (!currentPartyId) return;
                const chatRef = ref(database, `party/${currentPartyId}/chat`);
                off(chatRef);
                onValue(chatRef, (snap) => {
                    const data = snap.val() || {};
                    const logDiv = document.getElementById('party-chat-log');
                    let html = '';
                    const msgs = Object.values(data).sort((a,b) => a.timestamp - b.timestamp);
                    msgs.forEach(msg => {
                        html += `<div><b>${msg.nickname}:</b> ${msg.text}</div>`;
                    });
                    logDiv.innerHTML = html;
                    logDiv.scrollTop = logDiv.scrollHeight;
                });
            },
            sendChat: function() {
                if (!currentPartyId) return;
                const input = document.getElementById('party-chat-input');
                const text = input.value.trim();
                if (!text) return;
                if (text.length > 30) { alert("30文字まで"); return; }
                // クールタイム5秒（簡易）
                if (window._lastChatTime && Date.now() - window._lastChatTime < 5000) {
                    alert("5秒クールタイムです");
                    return;
                }
                window._lastChatTime = Date.now();
                const chatRef = push(ref(database, `party/${currentPartyId}/chat`));
                set(chatRef, {
                    uid: userId,
                    nickname: window.playerData.nickname,
                    text: text,
                    timestamp: Date.now()
                });
                input.value = '';
            },
            startPartyBattle: function(mode) {
                if (!isPartyLeader) { alert("リーダーのみ開始できます"); return; }
                document.getElementById('party-adventure-select').style.display = 'none';
                // バトル開始
                PartyBattleController.init(mode);
                GameController.switchScreen('party-battle-screen');
            }
        };

        // ============================================================
        //  パーティーバトルコントローラー
        // ============================================================
        // パーティーメンバーの状態管理
        let partyBattleState = {
            active: false,
            mode: '',
            members: [], // [{uid, nickname, hp, maxHp, shield, hand, effects, isDead, typingDone, selectedCard, target}]
            boss: { hp: 0, maxHp: 0, attack: 0, name: '', shield: 0, special: null },
            turnOrder: [],
            currentTurnIndex: 0,
            phase: 'selecting', // selecting, typing, resolving, enemy
            battleLog: [],
            rewardPacks: 0
        };

        window.PartyBattleController = {
            init: function(mode) {
                // モードに応じたボス設定
                const bossData = this.getBossData(mode);
                partyBattleState.active = true;
                partyBattleState.mode = mode;
                partyBattleState.boss = bossData;
                partyBattleState.members = partyMembers.map(m => ({
                    uid: m.uid,
                    nickname: m.nickname || '不明',
                    hp: 350,
                    maxHp: 350,
                    shield: 0,
                    hand: [],
                    effects: [],
                    isDead: false,
                    typingDone: false,
                    selectedCard: null,
                    target: null,
                    nextTurnMultiplier: 1.0,
                    parryTurns: 0,
                    burnTurns: 0,
                    healOverTimeTurns: 0,
                    healOverTimeAmount: 30,
                    frozenTurns: 0
                }));
                // 各メンバーに手札を配布
                this.fillAllHands();
                this.updatePartyHPUI();
                this.updateBattleLog('⚔️ パーティーバトル開始！');
                this.setPhase('selecting');
                this.renderHands();
                // ターン順序
                partyBattleState.turnOrder = partyBattleState.members.map((_, i) => i);
                partyBattleState.currentTurnIndex = 0;
                // バトルループ開始
                this.nextTurn();
            },
            getBossData: function(mode) {
                const base = {
                    hp: 0, maxHp: 0, attack: 80, name: '', shield: 0, special: null
                };
                switch(mode) {
                    case 'pack_easy':
                        return { ...base, hp: 5000, maxHp: 5000, attack: 80, name: '🟢 レベチ簡単ボス', special: this.specialEasy };
                    case 'pack_medium':
                        return { ...base, hp: 10000, maxHp: 10000, attack: 80, name: '🟡 レベチ中級ボス', special: this.specialMedium };
                    case 'pack_hard':
                        return { ...base, hp: 15000, maxHp: 15000, attack: 80, name: '🔴 レベチ上級ボス', special: this.specialHard };
                    case 'boss_shield':
                        return { ...base, hp: 10000, maxHp: 10000, attack: 120, name: '🛡️ シールドニキ', special: this.specialShield };
                    default: return base;
                }
            },
            specialEasy: function() {
                // チャージ: 25%で次ターン攻撃100
                if (Math.random() < 0.25) {
                    partyBattleState.boss.attack = 100;
                    PartyBattleController.updateBattleLog('💪 ボスがチャージした！ 次ターン攻撃力100！');
                    return true;
                }
                return false;
            },
            specialMedium: function() {
                // 切り払い: 30%で全体に50ダメージ
                if (Math.random() < 0.3) {
                    partyBattleState.members.forEach(m => {
                        if (!m.isDead) {
                            let dmg = 50;
                            if (m.shield > 0) {
                                if (m.shield >= dmg) { m.shield -= dmg; dmg = 0; }
                                else { dmg -= m.shield; m.shield = 0; }
                            }
                            if (dmg > 0) m.hp = Math.max(0, m.hp - dmg);
                        }
                    });
                    PartyBattleController.updateBattleLog('🌀 ボスが切り払い！ パーティー全員に50ダメージ！');
                    PartyBattleController.updatePartyHPUI();
                    return true;
                }
                return false;
            },
            specialHard: function() {
                // 一人を3ターン動けなくする (25%)
                if (Math.random() < 0.25) {
                    const alive = partyBattleState.members.filter(m => !m.isDead);
                    if (alive.length > 0) {
                        const target = alive[Math.floor(Math.random() * alive.length)];
                        target.frozenTurns = 3;
                        PartyBattleController.updateBattleLog(`❄️ ボスが ${target.nickname} を3ターン凍結！`);
                        return true;
                    }
                }
                return false;
            },
            specialShield: function() {
                // 攻撃後に35%でシールド100
                if (Math.random() < 0.35) {
                    partyBattleState.boss.shield = 100;
                    PartyBattleController.updateBattleLog('🛡️ ボスがシールドを張った！ (100)');
                    return true;
                }
                return false;
            },
            fillAllHands: function() {
                partyBattleState.members.forEach((m, idx) => {
                    if (m.isDead) return;
                    m.hand = [];
                    const cardPool = this.getCardPoolForMember(m);
                    for (let i=0; i<5; i++) {
                        const card = cardPool[Math.floor(Math.random() * cardPool.length)];
                        if (card) m.hand.push(card);
                    }
                });
            },
            getCardPoolForMember: function(member) {
                // 装備デッキからランダム、または所持カード
                const equipped = window.playerData.equipped || [];
                const inventory = Object.keys(window.playerData.inventory);
                let pool = [];
                if (equipped.length === 25) {
                    pool = equipped.map(id => UIController.getCardById(id)).filter(c => c);
                } else if (inventory.length > 0) {
                    pool = inventory.map(id => UIController.getCardById(id)).filter(c => c);
                }
                if (pool.length === 0) {
                    pool = ALL_CARDS.filter(c => !c.id.startsWith("boss_") && !c.id.startsWith("craft_") && !c.id.startsWith("ex"));
                }
                // 攻撃力倍率カードの排出率を8割減
                const multiplierCards = pool.filter(c => c.type === 'assist' && c.baseEffect > 1.5);
                const normalCards = pool.filter(c => !multiplierCards.includes(c));
                const finalPool = [];
                // 8割減: 通常カードから4枚に1枚は倍率カード
                for (let i=0; i<normalCards.length; i++) {
                    finalPool.push(normalCards[i]);
                    if (i % 4 === 0 && multiplierCards.length > 0) {
                        finalPool.push(multiplierCards[Math.floor(Math.random() * multiplierCards.length)]);
                    }
                }
                if (finalPool.length === 0) finalPool.push(...normalCards);
                return finalPool;
            },
            renderHands: function() {
                const container = document.getElementById('party-battle-hand');
                container.innerHTML = '';
                const myIndex = partyBattleState.members.findIndex(m => m.uid === userId);
                if (myIndex === -1) return;
                const me = partyBattleState.members[myIndex];
                if (me.isDead) {
                    container.innerHTML = '<p style="color:#ff6666;">💀 あなたは戦闘不能です</p>';
                    return;
                }
                me.hand.forEach((card, idx) => {
                    container.innerHTML += UIController.createCardHTML(card, 0, `PartyBattleController.selectCard(${idx})`);
                });
            },
            selectCard: function(index) {
                const myIndex = partyBattleState.members.findIndex(m => m.uid === userId);
                if (myIndex === -1) return;
                const me = partyBattleState.members[myIndex];
                if (me.isDead || me.typingDone || partyBattleState.phase !== 'selecting') return;
                if (me.frozenTurns > 0) {
                    this.updateBattleLog(`❄️ あなたは凍っていてカードが使えない！`);
                    me.frozenTurns--;
                    me.typingDone = true;
                    this.checkAllTypingDone();
                    return;
                }
                const card = me.hand[index];
                if (!card) return;
                me.selectedCard = card;
                me.hand.splice(index, 1);
                // タイピング開始
                const word = TYPING_WORDS[Math.floor(Math.random() * TYPING_WORDS.length)];
                document.getElementById('party-typing-ja').textContent = word.ja;
                document.getElementById('party-typing-en').innerHTML = '';
                document.getElementById('party-typing-message').textContent = `⚡ 「${card.name}」発動！タイピングせよ！`;
                partyBattleState.phase = 'typing';
                // キー入力待ち
                window._partyTypingWord = word;
                window._partyTypingIndex = 0;
                window._partyTypingMistakes = 0;
                window._partyTypingStart = performance.now();
            },
            handleTyping: function(key) {
                if (partyBattleState.phase !== 'typing') return;
                const word = window._partyTypingWord;
                if (!word) return;
                const target = word.en[window._partyTypingIndex];
                if (key.toLowerCase() === target.toLowerCase()) {
                    AudioController.playType();
                    window._partyTypingIndex++;
                    const typedPart = word.en.substring(0, window._partyTypingIndex);
                    const remainingPart = word.en.substring(window._partyTypingIndex);
                    document.getElementById('party-typing-en').innerHTML = `<span class="typed">${typedPart}</span><span>${remainingPart}</span>`;
                    if (window._partyTypingIndex >= word.en.length) {
                        this.resolveCardEffect();
                    }
                } else {
                    AudioController.playError();
                    window._partyTypingMistakes++;
                }
            },
            resolveCardEffect: function() {
                const myIndex = partyBattleState.members.findIndex(m => m.uid === userId);
                if (myIndex === -1) return;
                const me = partyBattleState.members[myIndex];
                const card = me.selectedCard;
                if (!card) return;
                const mistakes = window._partyTypingMistakes || 0;
                const timeTaken = performance.now() - window._partyTypingStart;

                // 効果解決
                let logMsg = `${me.nickname} が ${card.name} を使用！ `;
                let targetMember = null;
                // 回復・アシストはターゲット選択が必要
                if (card.type === 'heal' || card.type === 'assist') {
                    // ターゲット選択UIを表示
                    this.showTargetSelect(card);
                    return; // 後でコールバック
                } else {
                    // 攻撃カード
                    this.applyAttackCard(me, card, mistakes, timeTaken, logMsg);
                    me.typingDone = true;
                    this.checkAllTypingDone();
                }
                this.renderHands();
                document.getElementById('party-typing-ja').textContent = '';
                document.getElementById('party-typing-en').innerHTML = '';
                document.getElementById('party-typing-message').textContent = '👇 次のカードを選択';
            },
            showTargetSelect: function(card) {
                const container = document.getElementById('party-target-select');
                const buttonsDiv = document.getElementById('party-target-buttons');
                buttonsDiv.innerHTML = '';
                container.style.display = 'block';
                const alive = partyBattleState.members.filter(m => !m.isDead);
                alive.forEach(m => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-primary';
                    btn.textContent = m.nickname;
                    btn.onclick = () => {
                        // ターゲット決定
                        const myIndex = partyBattleState.members.findIndex(mem => mem.uid === userId);
                        const me = partyBattleState.members[myIndex];
                        if (card.type === 'heal') {
                            this.applyHealCard(me, m, card);
                        } else {
                            this.applyAssistCard(me, m, card);
                        }
                        container.style.display = 'none';
                        me.typingDone = true;
                        this.checkAllTypingDone();
                        this.renderHands();
                        document.getElementById('party-typing-ja').textContent = '';
                        document.getElementById('party-typing-en').innerHTML = '';
                        document.getElementById('party-typing-message').textContent = '👇 次のカードを選択';
                    };
                    buttonsDiv.appendChild(btn);
                });
            },
            applyAttackCard: function(user, card, mistakes, timeTaken, logMsg) {
                let effect = card.baseEffect;
                if (mistakes === 0) effect += 5;
                else effect = Math.max(1, effect - mistakes);
                if (timeTaken <= 1000) effect += 10;
                effect = Math.floor(effect * user.nextTurnMultiplier);
                user.nextTurnMultiplier = 1.0;
                // ボスにダメージ
                let boss = partyBattleState.boss;
                if (boss.shield > 0) {
                    if (effect >= boss.shield) { effect -= boss.shield; boss.shield = 0; }
                    else { boss.shield -= effect; effect = 0; }
                }
                boss.hp = Math.max(0, boss.hp - effect);
                logMsg += `💥 ${effect} ダメージ！`;
                this.updateBattleLog(logMsg);
                this.updatePartyHPUI();
                AudioController.playAttack();
                // ボスHP0チェック
                if (boss.hp <= 0) {
                    this.endBattle(true);
                }
            },
            applyHealCard: function(user, target, card) {
                let effect = card.baseEffect;
                if (window._partyTypingMistakes === 0) effect += 5;
                else effect = Math.max(1, effect - window._partyTypingMistakes);
                target.hp = Math.min(target.maxHp, target.hp + effect);
                this.updateBattleLog(`${user.nickname} が ${target.nickname} を 💖${effect} 回復！`);
                this.updatePartyHPUI();
                AudioController.playHeal();
            },
            applyAssistCard: function(user, target, card) {
                if (card.id === 'ultra_shield') {
                    target.shield = (target.shield || 0) + 150;
                    this.updateBattleLog(`${user.nickname} が ${target.nickname} に 🛡️150 バリアを付与！`);
                } else if (card.type === 'assist' && card.baseEffect > 1.5) {
                    user.nextTurnMultiplier = card.baseEffect;
                    this.updateBattleLog(`${user.nickname} の次の攻撃が ${card.baseEffect} 倍！`);
                } else {
                    // その他アシスト（リセットなど）
                    if (card.name.includes('リセット') || card.name.includes('ドロー') || card.name.includes('入れ替え')) {
                        let count = card.baseEffect || 2;
                        count = Math.max(1, count - Math.floor(window._partyTypingMistakes * 0.5));
                        target.hand = [];
                        const pool = this.getCardPoolForMember(target);
                        for (let i=0; i<count && i<5; i++) {
                            const c = pool[Math.floor(Math.random() * pool.length)];
                            if (c) target.hand.push(c);
                        }
                        this.updateBattleLog(`${user.nickname} が ${target.nickname} の手札を ${count} 枚リセット！`);
                    }
                }
                this.updatePartyHPUI();
                AudioController.playHeal();
            },
            checkAllTypingDone: function() {
                const allDone = partyBattleState.members.every(m => m.isDead || m.typingDone);
                if (allDone) {
                    // 全員終了 → ターン解決フェーズ
                    this.resolveTurn();
                }
            },
            resolveTurn: function() {
                // ここで順番に行動を解決（既にカード効果は適用済みだが、状態異常なども反映）
                // そして敵ターン
                this.setPhase('resolving');
                // 状態異常の更新（燃焼、持続回復など）は簡略化
                partyBattleState.members.forEach(m => {
                    if (m.isDead) return;
                    // 各種効果処理（簡略）
                    if (m.burnTurns > 0) {
                        let dmg = 20;
                        if (m.shield > 0) {
                            if (m.shield >= dmg) { m.shield -= dmg; dmg = 0; }
                            else { dmg -= m.shield; m.shield = 0; }
                        }
                        if (dmg > 0) m.hp = Math.max(0, m.hp - dmg);
                        this.updateBattleLog(`${m.nickname} が燃焼ダメージ！ ${dmg}`);
                        m.burnTurns--;
                    }
                    if (m.healOverTimeTurns > 0) {
                        m.hp = Math.min(m.maxHp, m.hp + m.healOverTimeAmount);
                        this.updateBattleLog(`${m.nickname} が持続回復！ ${m.healOverTimeAmount}`);
                        m.healOverTimeTurns--;
                    }
                    if (m.frozenTurns > 0) m.frozenTurns--;
                });
                this.updatePartyHPUI();
                // 敵ターン
                this.enemyTurn();
            },
            enemyTurn: function() {
                this.setPhase('enemy');
                // ボス特殊攻撃
                let specialUsed = false;
                if (partyBattleState.boss.special) {
                    specialUsed = partyBattleState.boss.special();
                }
                if (!specialUsed) {
                    // 通常攻撃: ランダムな生きているメンバーに攻撃
                    const alive = partyBattleState.members.filter(m => !m.isDead);
                    if (alive.length > 0) {
                        const target = alive[Math.floor(Math.random() * alive.length)];
                        let dmg = partyBattleState.boss.attack;
                        if (target.shield > 0) {
                            if (target.shield >= dmg) { target.shield -= dmg; dmg = 0; }
                            else { dmg -= target.shield; target.shield = 0; }
                        }
                        if (dmg > 0) target.hp = Math.max(0, target.hp - dmg);
                        this.updateBattleLog(`👹 ボスが ${target.nickname} に ${dmg} ダメージ！`);
                        this.updatePartyHPUI();
                    }
                }
                // ボスの攻撃力リセット（チャージ用）
                if (partyBattleState.mode === 'pack_easy') {
                    partyBattleState.boss.attack = 80;
                }
                // ボスHPチェック
                if (partyBattleState.boss.hp <= 0) {
                    this.endBattle(true);
                    return;
                }
                // パーティー全滅チェック
                const allDead = partyBattleState.members.every(m => m.isDead || m.hp <= 0);
                if (allDead) {
                    this.endBattle(false);
                    return;
                }
                // 次のターンへ
                this.resetForNextTurn();
                this.setPhase('selecting');
                this.renderHands();
                document.getElementById('party-typing-message').textContent = '👇 カードを選んでください';
                document.getElementById('party-typing-ja').textContent = '';
                document.getElementById('party-typing-en').innerHTML = '';
            },
            resetForNextTurn: function() {
                partyBattleState.members.forEach(m => {
                    m.typingDone = false;
                    m.selectedCard = null;
                    // 手札補充
                    while (m.hand.length < 5 && !m.isDead) {
                        const pool = this.getCardPoolForMember(m);
                        const card = pool[Math.floor(Math.random() * pool.length)];
                        if (card) m.hand.push(card);
                    }
                });
                // 生存者チェック
                partyBattleState.members.forEach(m => {
                    if (m.hp <= 0) {
                        m.isDead = true;
                        m.hp = 0;
                    }
                });
                this.updatePartyHPUI();
            },
            endBattle: function(win) {
                partyBattleState.active = false;
                if (win) {
                    let reward = 0;
                    switch(partyBattleState.mode) {
                        case 'pack_easy': reward = 50; break;
                        case 'pack_medium': reward = 100; break;
                        case 'pack_hard': reward = 200; break;
                        case 'boss_shield': reward = 80; break;
                    }
                    window.playerData.packs += reward;
                    GameDataManager.saveData();
                    this.updateBattleLog(`🎉 勝利！ ${reward}パック獲得！`);
                    if (partyBattleState.mode === 'boss_shield') {
                        // 10%でウルトラシールドドロップ
                        if (Math.random() < 0.1) {
                            const card = ALL_CARDS.find(c => c.id === 'ultra_shield');
                            if (card) {
                                if (!window.playerData.inventory[card.id]) window.playerData.inventory[card.id] = 0;
                                window.playerData.inventory[card.id]++;
                                this.updateBattleLog('🎉 ウルトラシールド を入手！');
                                showCenterMessage('🎉 ウルトラシールド ゲット！', '#ffd700');
                            }
                        }
                    }
                    showCenterMessage(`🏆 勝利！ ${reward}パック`, '#ffd700');
                } else {
                    this.updateBattleLog('💀 パーティー全滅...');
                    showCenterMessage('💀 敗北...', '#ff4444');
                }
                // バトル終了、ホームへ
                setTimeout(() => {
                    GameController.switchScreen('home-screen');
                    // パーティー状態は維持
                }, 2000);
            },
            updatePartyHPUI: function() {
                const container = document.getElementById('party-hp-container');
                container.innerHTML = '';
                partyBattleState.members.forEach(m => {
                    const hpPercent = m.maxHp > 0 ? (m.hp / m.maxHp * 100) : 0;
                    const color = m.isDead ? '#ff4444' : '#4caf50';
                    const div = document.createElement('div');
                    div.style.cssText = `background:rgba(0,0,0,0.7); padding:6px 12px; border-radius:8px; border:2px solid ${color}; min-width:120px;`;
                    div.innerHTML = `
                        <div style="font-size:14px; font-weight:bold;">${m.nickname} ${m.isDead ? '💀' : ''}</div>
                        <div style="font-size:13px;">HP: ${Math.floor(m.hp)}/${m.maxHp}</div>
                        <div style="width:100%; height:12px; background:#222; border-radius:6px; overflow:hidden; margin-top:4px;">
                            <div style="height:100%; width:${hpPercent}%; background:${color};"></div>
                        </div>
                        ${m.shield > 0 ? `<div style="font-size:12px; color:#88ccff;">🛡️ ${m.shield}</div>` : ''}
                    `;
                    container.appendChild(div);
                });
                // ボスHP表示（簡易）
                const boss = partyBattleState.boss;
                const bossPercent = boss.maxHp > 0 ? (boss.hp / boss.maxHp * 100) : 0;
                const bossDiv = document.createElement('div');
                bossDiv.style.cssText = `background:rgba(0,0,0,0.7); padding:6px 12px; border-radius:8px; border:2px solid #e94560; min-width:120px;`;
                bossDiv.innerHTML = `
                    <div style="font-size:14px; font-weight:bold;">👹 ${boss.name}</div>
                    <div style="font-size:13px;">HP: ${Math.floor(boss.hp)}/${boss.maxHp}</div>
                    <div style="width:100%; height:12px; background:#222; border-radius:6px; overflow:hidden; margin-top:4px;">
                        <div style="height:100%; width:${bossPercent}%; background:linear-gradient(90deg,#c62828,#f44336);"></div>
                    </div>
                    ${boss.shield > 0 ? `<div style="font-size:12px; color:#88ccff;">🛡️ ${boss.shield}</div>` : ''}
                `;
                container.appendChild(bossDiv);
            },
            updateBattleLog: function(msg) {
                const logDiv = document.getElementById('party-battle-log');
                logDiv.innerHTML = `<p>${msg}</p>` + logDiv.innerHTML;
            },
            setPhase: function(phase) {
                partyBattleState.phase = phase;
            },
            flee: function() {
                if (confirm("逃げますか？")) {
                    partyBattleState.active = false;
                    GameController.switchScreen('home-screen');
                }
            }
        };

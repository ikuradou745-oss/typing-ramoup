<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ NEON TYPING｜ネオンタイピングゲーム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        :root {
            --bg-dark: #0a0f1e;
            --neon-blue: #0ff;
            --neon-green: #0f6;
            --neon-pink: #f0f;
            --neon-gold: #ffcc44;
            --text-light: #f0f0f0;
            --card-bg: rgba(10, 20, 30, 0.7);
        }
        body {
            font-family: 'Segoe UI', 'Poppins', 'Hiragino Maru Gothic', monospace;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #020408);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }
        /* テーマスタイル */
        body.theme-neon { --neon-blue: #0ff; --neon-green: #0f0; --neon-pink: #ff44ff; }
        body.theme-classic { --neon-blue: #4a90e2; --neon-green: #50c878; --neon-pink: #ff6b6b; background: #1a2a3a; }
        body.theme-oldclassic { --neon-blue: #8b5a2b; --neon-green: #6b8e23; --neon-pink: #cd5c5c; background: #2f4f4f; }
        body.theme-dot { background-image: radial-gradient(#0ff 1px, transparent 1px); background-size: 6px 6px; }
        /* カラーオーバーライド */
        body.color-red { --neon-blue: #ff5555; --neon-green: #ff7777; --neon-pink: #ff3333; }
        body.color-cyan { --neon-blue: #0ff; --neon-green: #0ff; --neon-pink: #0ff; }
        body.color-yellow { --neon-blue: #ffcc44; --neon-green: #ffaa33; --neon-pink: #ffaa44; }
        body.color-magenta { --neon-blue: #ff44ff; --neon-green: #ff44ff; --neon-pink: #ff44ff; }
        body.color-rainbow { --neon-blue: #ff00cc; --neon-green: #ffcc00; --neon-pink: #00ffcc; }
        /* フォント */
        body.font-gothic { font-family: 'Motoya Gothic', 'Hiragino Kaku Gothic', sans-serif; }
        body.font-chalai { font-family: 'Comic Neue', 'Comic Sans MS', cursive; }
        body.font-dot { font-family: 'Courier New', 'MS Gothic', monospace; letter-spacing: 2px; }
        body.font-superclassic { font-family: 'Times New Roman', 'YuMincho', serif; }
        
        .game-wrapper { width: 1300px; max-width: 96vw; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-radius: 60px; padding: 24px; border: 1px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0,255,255,0.2); }
        /* ヘッダー */
        .status-header { display: flex; justify-content: flex-end; gap: 30px; padding: 12px 24px; background: rgba(0,0,0,0.6); border-radius: 60px; margin-bottom: 20px; align-items: center; }
        .level-area { display: flex; flex-direction: column; align-items: flex-end; }
        .level-text { font-size: 1.2rem; color: var(--neon-gold); }
        .xp-bar-bg { width: 150px; height: 8px; background: #333; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .xp-fill { background: linear-gradient(90deg, var(--neon-blue), var(--neon-green)); height: 100%; width: 0%; transition: width 0.2s; }
        .coin-area { display: flex; align-items: center; gap: 8px; font-size: 1.6rem; font-weight: bold; color: var(--neon-gold); }
        /* メニューグリッド */
        .menu-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 40px 0; }
        .menu-card { background: var(--card-bg); border: 2px solid var(--neon-blue); border-radius: 36px; width: 160px; padding: 28px 12px; text-align: center; cursor: pointer; transition: 0.2s; backdrop-filter: blur(4px); }
        .menu-card:hover { transform: translateY(-5px); box-shadow: 0 0 20px var(--neon-blue); border-color: var(--neon-pink); }
        .menu-icon { font-size: 3rem; display: block; margin-bottom: 10px; }
        /* 汎用 */
        .neon-btn { background: rgba(0,0,0,0.6); border: 2px solid var(--neon-blue); color: var(--neon-blue); padding: 12px 28px; border-radius: 60px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .neon-btn:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px cyan; }
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: center; }
        .question-word { font-size: 4rem; text-align: center; background: rgba(0,0,0,0.5); padding: 30px; border-radius: 70px; margin: 20px auto; word-break: break-all; color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-pink); font-weight: bold; }
        .input-field { font-size: 2rem; padding: 12px 28px; width: 80%; text-align: center; background: #111; border: 3px solid var(--neon-blue); border-radius: 60px; color: var(--neon-green); font-family: monospace; }
        .score-board { display: flex; justify-content: center; gap: 50px; font-size: 2rem; margin: 20px; }
        .timer-big { font-size: 3rem; font-weight: bold; background: #000000aa; display: inline-block; padding: 8px 32px; border-radius: 60px; }
        .side-panel { position: fixed; top: 0; right: -450px; width: 450px; height: 100%; background: rgba(0,0,0,0.95); border-left: 3px solid var(--neon-blue); transition: 0.3s; z-index: 1000; padding: 30px; overflow-y: auto; }
        .side-panel.open { right: 0; }
        .tab-bar { display: flex; gap: 16px; border-bottom: 1px solid var(--neon-blue); margin-bottom: 20px; }
        .tab-btn { background: none; border: none; color: gray; padding: 10px; cursor: pointer; font-size: 1.2rem; }
        .tab-btn.active { color: var(--neon-blue); border-bottom: 2px solid var(--neon-blue); }
        .overlay-dark { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 999; display: none; }
        .interference-effect { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 2000; mix-blend-mode: screen; transition: opacity 1.5s; }
        .paint-splat { background: radial-gradient(circle, rgba(255,0,200,0.8), rgba(0,255,255,0.6)); width:100%; height:100%; }
        .thunder-flash { background: repeating-linear-gradient(45deg, yellow, orange, red); animation: flicker 0.1s infinite; }
        @keyframes flicker { 0% { opacity: 0.7; } 100% { opacity: 0.3; } }
        .fever-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, rgba(255,0,255,0.3), rgba(0,255,255,0.3)); pointer-events: none; z-index: 500; animation: rainbow 0.5s infinite; }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        .skill-toast { position: fixed; bottom: 30%; left: 50%; transform: translateX(-50%); background: gold; color: black; padding: 16px 32px; border-radius: 60px; font-weight: bold; font-size: 1.5rem; z-index: 3000; animation: fadeUp 0.6s; }
        @keyframes fadeUp { from { opacity: 0; bottom: 20%; } to { opacity: 1; bottom: 30%; } }
        .story-map-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 12px; max-width: 900px; max-height: 500px; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.4); border-radius: 40px; }
        .stage-node { aspect-ratio: 1/1; background: rgba(0,255,255,0.1); border: 2px solid var(--neon-blue); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; transition: 0.1s; }
        .stage-node.clear { background: rgba(0,255,100,0.3); border-color: var(--neon-green); }
        .stage-node.locked { opacity: 0.3; cursor: not-allowed; }
        .stage-node.current { border-color: var(--neon-gold); box-shadow: 0 0 15px gold; transform: scale(1.02); }
        .ranking-list { max-height: 500px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 28px; padding: 20px; width: 100%; }
        .ranking-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .settings-group { background: rgba(0,0,0,0.4); border-radius: 32px; padding: 20px; margin: 15px 0; }
        .mini-game-bar { width: 600px; height: 80px; background: #222; border-radius: 80px; position: relative; cursor: pointer; margin: 40px auto; }
        .bar-fill { width: 10%; height: 100%; background: linear-gradient(90deg, cyan, blue); border-radius: 80px; }
        .marker { position: absolute; top: -15px; width: 6px; height: 110px; background: white; left: 0; box-shadow: 0 0 8px white; }
        .game-container { display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none; }
        button:disabled { opacity: 0.5; pointer-events: none; }
        .skill-icon-btn { position: fixed; bottom: 30px; right: 30px; background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue)); border: none; border-radius: 60px; padding: 14px 28px; color: white; font-weight: bold; cursor: pointer; z-index: 300; box-shadow: 0 0 15px magenta; }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="status-header">
        <div class="level-area">
            <div class="level-text">Lv.<span id="levelVal">1</span> <span style="font-size:12px;">⭐ XP</span></div>
            <div class="xp-bar-bg"><div class="xp-fill" id="xpFill"></div></div>
        </div>
        <div class="coin-area">🪙 <span id="coinVal">0</span></div>
    </div>
    <div id="appMain"></div>
</div>
<div id="sidePanel" class="side-panel"><div id="panelContent"></div><button class="neon-btn" id="closePanel" style="margin-top:20px;">閉じる</button></div>
<div id="overlay" class="overlay-dark"></div>
<button id="globalSkillBtn" class="skill-icon-btn" style="display:none;">✨ スキル</button>

<script>
    // ----------------------------- 単語データ -----------------------------
    const WORD_SETS = {
        easy: ["さくら","ねこ","いぬ","ごはん","みず","おちゃ","えき","うみ","ゆめ","とり","あめ","くも","はな","そら","つき","ほし","やま","かわ","ほん","ゆき"],
        medium: ["おたんじょうび","しんかんせん","ゆうびんきょく","ありがとう","おめでとう","いってきます","ただいま","おやすみなさい","ともだち","がっこう","せんせい","あさごはん","にほんご","べんきょう","にちようび"],
        hard: ["よろしくおねがいします","おつかれさまでした","ありがとうございます","しょうしょうおまちください","ごめんなさい","いらっしゃいませ","いただきます","ごちそうさまでした","お会いできてうれしいです","またあしたあいましょう","ゆっくりはなしてください","もういちどおしえてください","こまっている人をたすけます","いっしょうけんめいがんばる","きょうはいい天気ですね"]
    };
    // ローマ字表示補助用 (簡易)
    function getRomajiHint(word) { return word; } // 実際はひらがな表示優先
    
    // プレイヤー初期化
    let player = {
        level: 1, xp: 0, coins: 0,
        equippedSkill: null,
        unlockedSkills: []   // スキルID格納
    };
    
    // スキル定義
    const SKILLS = {
        auto_alpha: { name:"自動入力α", price:50000, cd:30, effect:"auto", duration:4.5, frames:64, desc:"4.5秒自動入力" },
        combo_alpha: { name:"コンボアップα", price:50000, cd:30, effect:"comboMult", duration:5, mult:1.5, desc:"5秒間コンボ1.5倍" },
        time_alpha: { name:"時間アップα", price:50000, cd:45, effect:"timeGame", desc:"ミニゲームで時間延長" },
        auto_gamma: { name:"自動入力γ", price:500000, cd:35, effect:"auto", duration:7.5, frames:64, desc:"7.5秒自動入力" },
        combo_gamma: { name:"コンボアップγ", price:500000, cd:35, effect:"comboMult", duration:10, mult:1.75, desc:"10秒間1.75倍" },
        fever_alpha: { name:"フィーバーα", price:1500000, cd:35, effect:"fever", duration:7, desc:"7秒フィーバー" },
        auto_pi: { name:"自動入力π", price:1500000, cd:25, effect:"hybrid", autoDur:1.5, feverDur:2, desc:"1.5秒自動+2秒フィーバー" },
        time_gamma: { name:"時間伸ばしγ", price:1500000, cd:200, effect:"preciseGame", desc:"精密ゲームで最大+10秒" },
        bunson_fever: { name:"ブンソンフィーバー！！", price:5000000, cd:35, effect:"fever", duration:15, passive:true, desc:"15秒フィーバー+パッシブ(残り5秒時コンボ1.35倍)" }
    };
    
    // ストーリー進行
    let storyProgress = 1;   // 1-indexed, 最大100
    let storyUnlocked = 1;
    let currentGameMode = null; // 'normal', 'story'
    let storyTargetScore = 10000;
    let gameActive = false;
    let gameInterval = null;
    let currentWordList = [];
    let currentWord = "";
    let score = 0, combo = 0, timeLeft = 60;
    let skillCooldown = 0;
    let activeFever = false;
    let activeComboMult = 1;
    let autoTimer = null;
    
    // 設定
    let settings = { volume: 70, theme: "ネオン", colorTheme: "デフォルト", font: "ノーマル" };
    
    // 音声簡易
    function playSound(type) {
        if(settings.volume === 0) return;
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = type === "correct" ? 880 : 440;
        gain.gain.value = settings.volume/100 * 0.15;
        osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.3);
        osc.stop(ctx.currentTime+0.2);
    }
    
    function updateUIStats() {
        document.getElementById("levelVal").innerText = player.level;
        document.getElementById("coinVal").innerText = Math.floor(player.coins);
        let needXP = player.level * 100;
        let percent = (player.xp / needXP) * 100;
        document.getElementById("xpFill").style.width = Math.min(100, percent) + "%";
    }
    
    function addRewards(finalScore) {
        let earnCoins = Math.floor(finalScore / 10);
        let earnXP = Math.floor(finalScore / 100);
        player.coins += earnCoins;
        player.xp += earnXP;
        while(player.xp >= player.level * 100) { player.xp -= player.level * 100; player.level++; }
        updateUIStats();
        return { earnCoins, earnXP };
    }
    
    // タイピングゲームコア
    function startGame(difficulty, isStory = false, stageId = 1) {
        if(gameInterval) clearInterval(gameInterval);
        let words = [...WORD_SETS[difficulty]];
        currentWordList = words;
        currentWord = currentWordList[Math.floor(Math.random() * currentWordList.length)];
        score = 0; combo = 0; timeLeft = 60; gameActive = true; activeFever = false; activeComboMult = 1;
        if(isStory) { storyTargetScore = 10000 + (stageId-1)*1000; currentGameMode = "story"; }
        else currentGameMode = "normal";
        renderGameScreen(difficulty, isStory, stageId);
        startTimerAndLoop();
        if(isStory && stageId >= 26) applyStoryInterference(stageId);
    }
    
    function applyStoryInterference(stage) {
        if(!gameActive) return;
        if(stage >= 26 && stage <= 50) {
            setTimeout(() => { if(gameActive) { const div = document.createElement("div"); div.className="interference-effect paint-splat"; document.body.appendChild(div); setTimeout(()=>div.remove(),1500); } }, 1000);
        } else if(stage >= 51 && stage <= 75) {
            timeLeft = Math.max(0, timeLeft - 10);
            document.getElementById("timerVal") && (document.getElementById("timerVal").innerText = timeLeft);
        } else if(stage >= 76 && stage <= 99) {
            setTimeout(() => { if(gameActive) { combo = 0; document.getElementById("comboVal").innerText=combo; const flash=document.createElement("div"); flash.className="interference-effect thunder-flash"; document.body.appendChild(flash); setTimeout(()=>flash.remove(),600); } }, 1500);
        } else if(stage === 100) {
            setTimeout(()=>{ const p=document.createElement("div"); p.className="interference-effect paint-splat"; document.body.appendChild(p); setTimeout(()=>p.remove(),1500); }, 500);
            setTimeout(()=>{ const p2=document.createElement("div"); p2.className="interference-effect paint-splat"; document.body.appendChild(p2); setTimeout(()=>p2.remove(),1500); }, 3000);
            setTimeout(()=>{ combo=0; const t=document.createElement("div"); t.className="interference-effect thunder-flash"; document.body.appendChild(t); setTimeout(()=>t.remove(),600); }, 5500);
        }
    }
    
    function startTimerAndLoop() {
        gameInterval = setInterval(() => {
            if(!gameActive) return;
            if(timeLeft <= 0) { endGame(); return; }
            timeLeft--;
            document.getElementById("timerVal") && (document.getElementById("timerVal").innerText = timeLeft);
            // パッシブ: 残り5秒でコンボ倍率 (ブンソンフィーバー装備時)
            if(player.equippedSkill === "bunson_fever" && timeLeft === 5 && activeComboMult === 1) {
                activeComboMult = 1.35;
                showToast("🔥 パッシブ発動！コンボ1.35倍 🔥");
            }
        }, 1000);
    }
    
    function renderGameScreen(diff, isStory, stageId) {
        const main = document.getElementById("appMain");
        main.innerHTML = `
            <div class="game-container">
                <div class="score-board"><span>🎯 SCORE: <span id="scoreVal">0</span></span><span>⚡ COMBO: <span id="comboVal">0</span></span></div>
                <div class="timer-big">⏱️ <span id="timerVal">${timeLeft}</span>s</div>
                <div class="question-word" id="questionWord">${currentWord}</div>
                <input type="text" id="typeInput" class="input-field" placeholder="ひらがなで入力" autofocus>
                <div class="flex-row" style="margin-top:20px;"><button id="skillUseBtn" class="neon-btn">✨ スキル発動</button><button id="exitGame" class="neon-btn">🏠 中断</button></div>
                ${isStory ? `<div style="margin-top:15px;">🎯 目標スコア: ${storyTargetScore}</div>` : ''}
            </div>
        `;
        const input = document.getElementById("typeInput");
        input.addEventListener("keypress", (e) => {
            if(e.key === "Enter" && gameActive) {
                let userVal = input.value.trim();
                if(userVal === currentWord) {
                    let add = Math.floor(combo * 5) * activeComboMult;
                    score += add;
                    combo++;
                    if(activeFever) { score += 300; showToast("🔥 FEVER +300 🔥"); }
                    document.getElementById("scoreVal").innerText = score;
                    document.getElementById("comboVal").innerText = combo;
                    playSound("correct");
                    // 次の単語
                    currentWord = currentWordList[Math.floor(Math.random() * currentWordList.length)];
                    document.getElementById("questionWord").innerText = currentWord;
                    input.value = "";
                } else {
                    combo = 0;
                    document.getElementById("comboVal").innerText = combo;
                    playSound("miss");
                    input.value = "";
                }
            }
        });
        document.getElementById("exitGame").onclick = () => { endGame(true); };
        document.getElementById("skillUseBtn").onclick = () => { if(gameActive && skillCooldown <= 0 && player.equippedSkill) useSkill(player.equippedSkill); else if(!player.equippedSkill) showToast("スキル未装備"); else showToast(`クールダウン中`); };
    }
    
    async function useSkill(skillId) {
        let sk = SKILLS[skillId];
        if(!sk) return;
        if(skillCooldown > 0) { showToast(`クールダウン残り${skillCooldown}秒`); return; }
        skillCooldown = sk.cd;
        startCooldownTimer();
        if(sk.effect === "auto" || sk.effect === "hybrid") {
            let dur = sk.duration || sk.autoDur || 4.5;
            autoTimer = setInterval(() => {
                if(!gameActive) return;
                let inp = document.getElementById("typeInput");
                if(inp && currentWord) { inp.value = currentWord; let ev = new Event("keypress"); ev.key="Enter"; inp.dispatchEvent(ev); }
            }, 1000/64);
            setTimeout(() => clearInterval(autoTimer), dur*1000);
            if(sk.effect === "hybrid" && sk.feverDur) { startFever(sk.feverDur); }
        }
        if(sk.effect === "fever") startFever(sk.duration);
        if(sk.effect === "comboMult") { activeComboMult = sk.mult; setTimeout(() => { activeComboMult = 1; }, sk.duration*1000); showToast(`${sk.name} 発動！${sk.duration}秒間コンボ${sk.mult}倍`); }
        if(sk.effect === "timeGame") startTimeMinigame(false);
        if(sk.effect === "preciseGame") startPrecisionMinigame();
        if(skillId === "bunson_fever") startFever(15);
        showToast(`${sk.name} 発動！`);
    }
    
    function startFever(seconds) {
        activeFever = true;
        const overlayDiv = document.createElement("div"); overlayDiv.className = "fever-overlay"; document.body.appendChild(overlayDiv);
        setTimeout(() => { activeFever = false; overlayDiv.remove(); }, seconds*1000);
    }
    
    function startTimeMinigame(isPrecise = false) {
        gameActive = false;
        // 簡易バーゲーム
        const container = document.createElement("div"); container.style.position="fixed"; container.style.top="0"; container.style.left="0"; container.style.width="100%"; container.style.height="100%"; container.style.background="rgba(0,0,0,0.8)"; container.style.zIndex="9999"; container.style.display="flex"; container.style.flexDirection="column"; container.style.alignItems="center"; container.style.justifyContent="center";
        const barDiv = document.createElement("div"); barDiv.className="mini-game-bar"; barDiv.style.width="500px"; const fill = document.createElement("div"); fill.className="bar-fill"; fill.style.width="10%"; barDiv.appendChild(fill); const marker = document.createElement("div"); marker.className="marker"; marker.style.left="10%"; barDiv.appendChild(marker);
        let pos = 10; let direction = 1; let moveInterval;
        const updateBar = () => { fill.style.width = pos + "%"; marker.style.left = pos + "%"; };
        moveInterval = setInterval(() => { pos += direction*2.2; if(pos>=98) direction=-1; if(pos<=2) direction=1; updateBar(); }, 20);
        const stopBtn = document.createElement("button"); stopBtn.innerText = "ストップ！"; stopBtn.className="neon-btn";
        stopBtn.onclick = () => {
            clearInterval(moveInterval);
            let addTime = 0;
            if(pos >= 40 && pos <= 60) addTime = 6.5;
            else if(pos >= 20 && pos <= 80) addTime = 3;
            else addTime = 0;
            if(addTime > 0) { timeLeft += addTime; showToast(`+${addTime}秒獲得！`); document.getElementById("timerVal") && (document.getElementById("timerVal").innerText = timeLeft); }
            container.remove();
            gameActive = true;
        };
        container.appendChild(barDiv); container.appendChild(stopBtn); document.body.appendChild(container);
    }
    function startPrecisionMinigame() {
        gameActive = false;
        const container = document.createElement("div"); container.style.position="fixed"; container.style.top="0"; container.style.left="0"; container.style.width="100%"; container.style.height="100%"; container.style.background="rgba(0,0,0,0.9)"; container.style.zIndex="9999"; container.style.display="flex"; container.style.flexDirection="column"; container.style.alignItems="center"; container.style.justifyContent="center";
        const barDiv = document.createElement("div"); barDiv.className="mini-game-bar"; barDiv.style.width="600px"; const fill = document.createElement("div"); fill.className="bar-fill"; fill.style.width="10%"; barDiv.appendChild(fill); const marker = document.createElement("div"); marker.className="marker"; marker.style.left="10%"; barDiv.appendChild(marker);
        let pos = 10; let direction = 1; let interval;
        interval = setInterval(() => { pos += direction*3.2; if(pos>=98) direction=-1; if(pos<=2) direction=1; fill.style.width = pos + "%"; marker.style.left = pos + "%"; }, 18);
        const stopBtn = document.createElement("button"); stopBtn.innerText = "精密ストップ！"; stopBtn.className="neon-btn";
        stopBtn.onclick = () => {
            clearInterval(interval);
            let add = 0;
            if(pos >= 48 && pos <= 52) add = 10;
            else if(pos >= 45 && pos <= 55) add = 7.5;
            else if(pos >= 35 && pos <= 65) add = 4;
            if(add>0) { timeLeft += add; showToast(`精密成功！ +${add}秒`); document.getElementById("timerVal") && (document.getElementById("timerVal").innerText = timeLeft); }
            container.remove();
            gameActive = true;
        };
        container.appendChild(barDiv); container.appendChild(stopBtn); document.body.appendChild(container);
    }
    
    function startCooldownTimer() {
        let interval = setInterval(() => { if(skillCooldown>0) skillCooldown--; else clearInterval(interval); }, 1000);
    }
    
    function endGame(abort=false) {
        if(gameInterval) clearInterval(gameInterval);
        if(autoTimer) clearInterval(autoTimer);
        gameActive = false;
        let finalScore = score;
        if(abort) { showHome(); return; }
        let rewards = addRewards(finalScore);
        let isClear = true;
        if(currentGameMode === "story") {
            if(finalScore >= storyTargetScore) {
                if(storyProgress >= 100) alert("ストーリー完全制覇！ スキル『ブンソンフィーバー！！』入手");
                else { storyProgress++; storyUnlocked = storyProgress; if(storyProgress===100 && !player.unlockedSkills.includes("bunson_fever")) player.unlockedSkills.push("bunson_fever"); }
                alert(`ステージクリア！ 次のステージ: ${storyProgress}`);
            } else { isClear = false; alert(`目標${storyTargetScore}に未達。再挑戦可能`); }
        }
        showResult(finalScore, rewards.earnCoins, rewards.earnXP);
    }
    
    function showResult(scoreFinal, coinsG, xpG) {
        const main = document.getElementById("appMain");
        main.innerHTML = `<div class="game-container"><div class="menu-title">🎉 リザルト 🎉</div><div style="font-size:48px;">${scoreFinal} pts</div><div>💰 +${coinsG} コイン &nbsp;⭐ +${xpG} XP</div><button id="backHomeBtn" class="neon-btn" style="margin-top:30px;">メインメニューへ</button></div>`;
        document.getElementById("backHomeBtn").onclick = () => showHome();
        updateUIStats();
    }
    
    // 各画面描写
    function showHome() {
        const main = document.getElementById("appMain");
        main.innerHTML = `<div class="menu-grid">
            <div class="menu-card" data-action="play"><div class="menu-icon">⌨️</div><div>プレイ</div></div>
            <div class="menu-card" data-action="story"><div class="menu-icon">📖</div><div>ストーリー</div></div>
            <div class="menu-card" data-action="rank"><div class="menu-icon">🏆</div><div>ランキング</div></div>
            <div class="menu-card" data-action="shop"><div class="menu-icon">🛒</div><div>スキルショップ</div></div>
            <div class="menu-card" data-action="settings"><div class="menu-icon">⚙️</div><div>設定</div></div>
        </div>`;
        document.querySelectorAll(".menu-card").forEach(card => {
            card.onclick = () => { const act = card.dataset.action; if(act === "play") showDifficulty(); else if(act === "story") showStoryMap(); else if(act === "rank") showRanking(); else if(act === "shop") showSkillShop(); else if(act === "settings") showSettings(); };
        });
        document.getElementById("globalSkillBtn").style.display = "none";
    }
    
    function showDifficulty() {
        const main = document.getElementById("appMain");
        main.innerHTML = `<div><h2>難易度選択</h2><div class="flex-row"><button class="neon-btn" data-diff="easy">🍃 簡単</button><button class="neon-btn" data-diff="medium">🌙 中級</button><button class="neon-btn" data-diff="hard">🔥 上級</button><button class="neon-btn" id="backHomeDiff">戻る</button></div></div>`;
        document.querySelectorAll("[data-diff]").forEach(btn => { btn.onclick = () => startGame(btn.dataset.diff, false); });
        document.getElementById("backHomeDiff").onclick = showHome;
    }
    
    function showStoryMap() {
        const main = document.getElementById("appMain");
        let stagesHtml = `<div><h2>📖 ストーリーモード</h2><div class="story-map-grid">`;
        for(let i=1;i<=100;i++) {
            let cls = "stage-node";
            if(i <= storyUnlocked) cls += " clear";
            if(i === storyProgress) cls += " current";
            if(i > storyUnlocked) cls += " locked";
            stagesHtml += `<div class="${cls}" data-stage="${i}">${i}</div>`;
        }
        stagesHtml += `</div><button id="storyPlayBtn" class="neon-btn" style="margin-top:20px;">▶ 現在ステージをプレイ</button><button id="backStory" class="neon-btn">戻る</button></div>`;
        main.innerHTML = stagesHtml;
        document.getElementById("storyPlayBtn").onclick = () => { let diff = storyProgress<=30?"easy":(storyProgress<=70?"medium":"hard"); startGame(diff, true, storyProgress); };
        document.getElementById("backStory").onclick = showHome;
        document.querySelectorAll(".stage-node.clear:not(.locked)").forEach(el => { el.onclick = () => { alert(`ステージ${el.dataset.stage}はクリア済み`); }; });
    }
    
    async function showRanking() {
        const main = document.getElementById("appMain");
        main.innerHTML = `<div><h2>🏆 ランキング (ローカル)</h2><div class="ranking-list"><div class="ranking-item"><span>ランク</span><span>スコア</span></div><div class="ranking-item"><span>1位</span><span>----</span></div></div><button class="neon-btn" id="rankBack">戻る</button></div>`;
        document.getElementById("rankBack").onclick = showHome;
    }
    
    function showSkillShop() {
        document.getElementById("globalSkillBtn").style.display = "none";
        const panel = document.getElementById("sidePanel");
        const overlay = document.getElementById("overlay");
        function renderShop() {
            let content = `<div><h2>🛒 スキルショップ</h2><div class="tab-bar"><button class="tab-btn active" data-tab="buy">購入</button><button class="tab-btn" data-tab="equip">装備</button></div><div id="shopTabContent"></div></div>`;
            document.getElementById("panelContent").innerHTML = content;
            let currentTab = "buy";
            function loadTab(tab) {
                const tabDiv = document.getElementById("shopTabContent");
                if(tab === "buy") {
                    let html = `<div>`;
                    for(let [id,sk] of Object.entries(SKILLS)) {
                        let owned = player.unlockedSkills.includes(id);
                        html += `<div style="border-bottom:1px solid gray;padding:12px;"><b>${sk.name}</b> ${sk.desc}<br>💰 ${sk.price} コイン ${owned?"✅所有済み":`<button class="neon-btn buy-skill" data-id="${id}" style="margin-left:10px;">購入</button>`}</div>`;
                    }
                    html += `</div>`;
                    tabDiv.innerHTML = html;
                    document.querySelectorAll(".buy-skill").forEach(btn => {
                        btn.onclick = () => { let sid = btn.dataset.id; let sk = SKILLS[sid]; if(player.coins >= sk.price && !player.unlockedSkills.includes(sid)) { player.coins -= sk.price; player.unlockedSkills.push(sid); updateUIStats(); renderShop(); showToast(`${sk.name}を購入！`); } else alert("コイン不足または既所有"); };
                    });
                } else {
                    let html = `<div>装備中スキル: ${player.equippedSkill ? SKILLS[player.equippedSkill]?.name : "なし"}<hr>`;
                    player.unlockedSkills.forEach(sid => {
                        html += `<div style="margin:8px;">${SKILLS[sid].name} <button class="neon-btn equip-skill" data-id="${sid}">装備</button></div>`;
                    });
                    html += `</div>`;
                    tabDiv.innerHTML = html;
                    document.querySelectorAll(".equip-skill").forEach(btn => {
                        btn.onclick = () => { player.equippedSkill = btn.dataset.id; showToast(`${SKILLS[btn.dataset.id].name}を装備`); renderShop(); };
                    });
                }
            }
            loadTab(currentTab);
            document.querySelectorAll(".tab-btn").forEach(btn => {
                btn.onclick = () => { currentTab = btn.dataset.tab; loadTab(currentTab); document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); };
            });
        }
        renderShop();
        panel.classList.add("open"); overlay.style.display = "block";
        document.getElementById("closePanel").onclick = () => { panel.classList.remove("open"); overlay.style.display = "none"; showHome(); };
    }
    
    function showSettings() {
        const main = document.getElementById("appMain");
        main.innerHTML = `<div><h2>⚙️ 設定</h2><div class="settings-group"><label>🔊 音量 <input type="range" id="volSlider" min="0" max="100" value="${settings.volume}"></label></div>
        <div class="settings-group"><label>🎨 テーマ: <select id="themeSelect"><option>ネオン</option><option>ノーマル</option><option>クラシック</option><option>オールドクラシック</option><option>ドット</option></select></label></div>
        <div class="settings-group"><label>🌈 カラー: <select id="colorSelect"><option>デフォルト</option><option>レッド</option><option>シアン</option><option>イエロー</option><option>マゼンタ</option><option>レインボー</option></select></label></div>
        <div class="settings-group"><label>✍️ フォント: <select id="fontSelect"><option>ノーマル</option><option>ゴシック体</option><option>チャラい</option><option>ドット</option><option>スーパークラシック</option></select></label></div>
        <button class="neon-btn" id="saveSettingsBtn">保存</button><button class="neon-btn" id="backSetting">戻る</button></div>`;
        document.getElementById("saveSettingsBtn").onclick = () => {
            settings.volume = parseInt(document.getElementById("volSlider").value);
            settings.theme = document.getElementById("themeSelect").value;
            settings.colorTheme = document.getElementById("colorSelect").value;
            settings.font = document.getElementById("fontSelect").value;
            document.body.className = `theme-${settings.theme === "ノーマル"?"default":settings.theme === "ネオン"?"neon":settings.theme === "クラシック"?"classic":settings.theme === "オールドクラシック"?"oldclassic":"dot"} color-${settings.colorTheme === "デフォルト"?"default":settings.colorTheme.toLowerCase()} font-${settings.font === "ノーマル"?"default":settings.font === "ゴシック体"?"gothic":settings.font === "チャラい"?"chalai":settings.font === "ドット"?"dot":"superclassic"}`;
            alert("設定保存");
        };
        document.getElementById("backSetting").onclick = showHome;
    }
    
    function showToast(msg) { const t=document.createElement("div"); t.className="skill-toast"; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),1500); }
    
    // 初期化
    function init() {
        showHome();
        updateUIStats();
        if(!player.unlockedSkills.includes("auto_alpha")) player.unlockedSkills = ["auto_alpha"]; // 初期スキル
        player.equippedSkill = "auto_alpha";
        document.getElementById("globalSkillBtn").style.display = "block";
        document.getElementById("globalSkillBtn").onclick = () => { if(gameActive && skillCooldown<=0 && player.equippedSkill) useSkill(player.equippedSkill); else showToast("スキル未装備orクールダウン"); };
    }
    init();
</script>
</body>
</html>

        window.TradeController = {
            renderMainMenu: function() {
                // トレード待機画面: ユーザーリスト
                const area = document.getElementById('trade-content-area');
                area.innerHTML = '<p style="color:#aaa;">読み込み中...</p>';
                get(ref(database, 'presence')).then((snap) => {
                    const data = snap.val() || {};
                    let html = '<div class="trade-list">';
                    const now = Date.now();
                    const oneDay = 24*60*60*1000;
                    const users = Object.entries(data).filter(([uid, uinfo]) => {
                        if (uid === userId) return false;
                        if (!uinfo.online) return false;
                        if (uinfo.lastLogin && (now - uinfo.lastLogin > oneDay)) return false;
                        return true;
                    });
                    if (users.length === 0) {
                        html += '<p style="color:#aaa;">トレード可能なユーザーはいません</p>';
                    } else {
                        users.forEach(([uid, uinfo]) => {
                            html += `
                                <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #333;">
                                    <span>${uinfo.nickname || '不明'}</span>
                                    <button class="btn-primary" style="padding:4px 16px; font-size:16px;" onclick="TradeController.requestTradeWith('${uid}')">トレードする</button>
                                </div>
                            `;
                        });
                    }
                    html += '</div>';
                    area.innerHTML = html;
                });
                // トレード通知リスナー
                this.listenTradeNotifications();
            },
            listenTradeNotifications: function() {
                const notifRef = ref(database, `trade_requests/${userId}`);
                off(notifRef);
                onValue(notifRef, (snap) => {
                    const data = snap.val() || {};
                    // 未処理のトレードリクエストがあれば通知
                    for (const [key, req] of Object.entries(data)) {
                        if (req.status === 'pending') {
                            this.showTradeRequestNotification(req, key);
                            break;
                        }
                    }
                });
            },
            showTradeRequestNotification: function(req, reqId) {
                const fromName = req.fromNickname || '不明';
                if (confirm(`${fromName}さんとトレードしますか？`)) {
                    this.acceptTradeRequest(reqId);
                } else {
                    this.rejectTradeRequest(reqId);
                }
            },
            requestTradeWith: function(uid) {
                // 相手にトレードリクエストを送信
                const refReq = push(ref(database, `trade_requests/${uid}`));
                set(refReq, {
                    from: userId,
                    fromNickname: window.playerData.nickname,
                    status: 'pending',
                    timestamp: Date.now()
                }).then(() => {
                    showCenterMessage('トレードリクエストを送信しました', '#00ffcc');
                });
            },
            acceptTradeRequest: function(reqId) {
                // 相手のリクエストを承認し、トレードルームを作成
                const reqRef = ref(database, `trade_requests/${userId}/${reqId}`);
                get(reqRef).then((snap) => {
                    const req = snap.val();
                    if (!req) return;
                    // 両者のトレードルームを作成
                    const roomRef = push(ref(database, 'trade_rooms'));
                    const roomId = roomRef.key;
                    const roomData = {
                        participants: [userId, req.from],
                        status: 'active',
                        cards: {
                            [userId]: [],
                            [req.from]: []
                        },
                        confirmed: {
                            [userId]: false,
                            [req.from]: false
                        },
                        createdAt: Date.now()
                    };
                    set(roomRef, roomData);
                    // リクエスト削除
                    remove(reqRef);
                    // トレード画面をルーム表示に切り替え
                    this.enterTradeRoom(roomId);
                });
            },
            rejectTradeRequest: function(reqId) {
                remove(ref(database, `trade_requests/${userId}/${reqId}`));
                showCenterMessage('トレードを拒否しました', '#ff6666');
            },
            enterTradeRoom: function(roomId) {
                // トレードルームUI表示
                const area = document.getElementById('trade-content-area');
                area.innerHTML = `
                    <h3>🔄 トレード中</h3>
                    <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">
                        <div style="flex:1; min-width:200px; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px;">
                            <h4>あなたの選択</h4>
                            <div id="my-trade-cards" style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center; min-height:100px;"></div>
                            <button class="btn-success" style="margin-top:10px;" onclick="TradeController.selectMyCards()">カードを選択</button>
                            <button class="btn-primary" style="margin-top:10px;" onclick="TradeController.confirmTrade()">決定</button>
                        </div>
                        <div style="flex:1; min-width:200px; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px;">
                            <h4>相手の選択</h4>
                            <div id="their-trade-cards" style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center; min-height:100px;"></div>
                            <div id="their-confirm-status" style="color:#ccc; margin-top:10px;">未確認</div>
                        </div>
                    </div>
                    <button class="btn-dark" style="margin-top:15px;" onclick="TradeController.leaveTradeRoom()">退出</button>
                `;
                window._tradeRoomId = roomId;
                this.listenTradeRoom(roomId);
                this.selectedTradeCards = [];
                this.renderMyTradeCards();
                this.renderTheirTradeCards();
            },
            listenTradeRoom: function(roomId) {
                const roomRef = ref(database, `trade_rooms/${roomId}`);
                off(roomRef);
                onValue(roomRef, (snap) => {
                    const data = snap.val();
                    if (!data) {
                        alert("トレードルームが閉じられました");
                        this.renderMainMenu();
                        return;
                    }
                    // カード情報を更新
                    window._tradeRoomData = data;
                    this.renderMyTradeCards();
                    this.renderTheirTradeCards();
                    // 両方決定したら成立
                    if (data.confirmed[userId] && data.confirmed[data.participants.find(p => p !== userId)]) {
                        this.executeTrade(data);
                    }
                });
            },
            selectMyCards: function() {
                // カード選択モーダル（簡易）
                const area = document.getElementById('trade-content-area');
                const modal = document.createElement('div');
                modal.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); z-index:300; display:flex; flex-direction:column; align-items:center; justify-content:center;';
                let html = `<h3 style="color:white;">カードを選択 (最大10枚)</h3><div style="display:flex; flex-wrap:wrap; gap:10px; max-width:800px; max-height:60vh; overflow-y:auto; padding:20px;">`;
                const inventory = window.playerData.inventory;
                let has = false;
                for (const [id, count] of Object.entries(inventory)) {
                    const card = UIController.getCardById(id);
                    if (!card) continue;
                    const already = this.selectedTradeCards.filter(c => c.id === id).length;
                    if (already >= count) continue;
                    has = true;
                    html += `<div onclick="TradeController.toggleSelectCard('${id}')" style="cursor:pointer;">${UIController.createCardHTML(card, 1)}</div>`;
                }
                if (!has) html += '<p style="color:#aaa;">選択できるカードがありません</p>';
                html += `</div><button class="btn-success" onclick="this.parentElement.remove()">閉じる</button>`;
                modal.innerHTML = html;
                document.body.appendChild(modal);
            },
            toggleSelectCard: function(id) {
                const idx = this.selectedTradeCards.findIndex(c => c.id === id);
                if (idx !== -1) {
                    this.selectedTradeCards.splice(idx, 1);
                } else {
                    if (this.selectedTradeCards.length >= 10) {
                        alert("最大10枚");
                        return;
                    }
                    const card = UIController.getCardById(id);
                    if (card) this.selectedTradeCards.push(card);
                }
                this.renderMyTradeCards();
                // 選択をFirebaseに保存
                const roomId = window._tradeRoomId;
                if (roomId) {
                    const cardIds = this.selectedTradeCards.map(c => c.id);
                    update(ref(database, `trade_rooms/${roomId}/cards/${userId}`), cardIds);
                }
            },
            renderMyTradeCards: function() {
                const container = document.getElementById('my-trade-cards');
                if (!container) return;
                const cards = this.selectedTradeCards || [];
                container.innerHTML = cards.length === 0 ? '<span style="color:#888;">未選択</span>' : cards.map(c => UIController.createCardHTML(c, 1)).join('');
            },
            renderTheirTradeCards: function() {
                const container = document.getElementById('their-trade-cards');
                if (!container) return;
                const data = window._tradeRoomData;
                if (!data) { container.innerHTML = '<span style="color:#888;">待機中</span>'; return; }
                const other = data.participants.find(p => p !== userId);
                if (!other) return;
                const theirCardIds = data.cards[other] || [];
                const cards = theirCardIds.map(id => UIController.getCardById(id)).filter(c => c);
                container.innerHTML = cards.length === 0 ? '<span style="color:#888;">未選択</span>' : cards.map(c => UIController.createCardHTML(c, 1)).join('');
                // 決定状況
                const statusDiv = document.getElementById('their-confirm-status');
                if (data.confirmed[other]) {
                    statusDiv.textContent = '✅ 相手が決定しました';
                    statusDiv.style.color = '#4caf50';
                } else {
                    statusDiv.textContent = '⏳ 相手はまだ決定していません';
                    statusDiv.style.color = '#ffaa00';
                }
            },
            confirmTrade: function() {
                const roomId = window._tradeRoomId;
                if (!roomId) return;
                if (this.selectedTradeCards.length === 0) {
                    alert("カードを選択してください");
                    return;
                }
                update(ref(database, `trade_rooms/${roomId}/confirmed/${userId}`), true);
                showCenterMessage('トレードを確定しました（相手の決定待ち）', '#ffcc00');
            },
            executeTrade: function(data) {
                const other = data.participants.find(p => p !== userId);
                // 自分のカードを減らす
                const myCards = data.cards[userId] || [];
                const theirCards = data.cards[other] || [];
                // 在庫処理
                for (const id of myCards) {
                    if (window.playerData.inventory[id]) {
                        window.playerData.inventory[id]--;
                        if (window.playerData.inventory[id] <= 0) delete window.playerData.inventory[id];
                    }
                }
                for (const id of theirCards) {
                    if (!window.playerData.inventory[id]) window.playerData.inventory[id] = 0;
                    window.playerData.inventory[id]++;
                }
                GameDataManager.saveData();
                // ルーム削除
                remove(ref(database, `trade_rooms/${window._tradeRoomId}`));
                showCenterMessage('🎉 トレード成立！', '#ffd700');
                this.renderMainMenu();
            },
            leaveTradeRoom: function() {
                if (window._tradeRoomId) {
                    remove(ref(database, `trade_rooms/${window._tradeRoomId}`));
                }
                this.renderMainMenu();
            }
        };

                if (text.length > 300) { alert("300文字まで"); return; }
                if (isNaN(packs) || packs < 50 || packs > 1000000) { alert("パック数は50〜1000000"); return; }
                // 1日2回制限
                const today = new Date().toDateString();
                if (this.lastSendDate !== today) {
                    this.sendCount = 0;
                    this.lastSendDate = today;
                }
                if (this.sendCount >= 2) {
                    alert("本日の送信上限に達しました");
                    return;
                }
                this.sendCount++;
                // Firebaseに保存
                const refBug = push(ref(database, 'bug_reports'));
                set(refBug, {
                    userId: userId,
                    nickname: window.playerData.nickname,
                    text: text,
                    packs: packs,
                    timestamp: Date.now(),
                    status: 'pending'
                }).then(() => {
                    showCenterMessage('送信しました！', '#00ffcc');
                    document.getElementById('bug-report-text').value = '';
                    document.getElementById('bug-report-packs').value = '';
                });
            },
            openMessageList: function() {
                const div = document.getElementById('bug-message-list');
                div.style.display = 'block';
            },
            loadMessages: function() {
                const code = document.getElementById('bug-code-input').value.trim();
                if (code !== this.bugPassword) {
                    alert("コードが違います");
                    return;
                }
                const container = document.getElementById('bug-messages-container');
                container.innerHTML = '読み込み中...';
                get(ref(database, 'bug_reports')).then((snap) => {
                    const data = snap.val() || {};
                    let html = '';
                    const sorted = Object.entries(data).sort((a,b) => b[1].timestamp - a[1].timestamp);
                    sorted.forEach(([key, report]) => {
                        const date = new Date(report.timestamp).toLocaleString();
                        html += `
                            <div class="message-list-item">
                                <div class="meta">${report.nickname} | ${date}</div>
                                <div class="content">${report.text}</div>
                                <div class="content">要求パック: ${report.packs}</div>
                                <div class="actions">
                                    <button class="btn-success" onclick="BugReportController.approveReport('${key}', ${report.packs})">許可</button>
                                    <button class="btn-danger" onclick="BugReportController.rejectReport('${key}')">拒否</button>
                                    <button class="btn-warning" onclick="BugReportController.blockReport('${key}')">ブロック</button>
                                </div>
                            </div>
                        `;
                    });
                    container.innerHTML = html || '<p>メッセージはありません</p>';
                });
            },
            approveReport: function(key, packs) {
                if (!confirm("この要求を許可しますか？")) return;
                // パックを付与
                window.playerData.packs += packs;
                GameDataManager.saveData();
                update(ref(database, `bug_reports/${key}`), { status: 'approved' });
                showCenterMessage(`✅ 許可しました (${packs}パック付与)`, '#4caf50');
                this.loadMessages();
            },
            rejectReport: function(key) {
                if (!confirm("拒否しますか？")) return;
                update(ref(database, `bug_reports/${key}`), { status: 'rejected' });
                showCenterMessage('❌ 拒否しました', '#ff6666');

            blockReport: function(key) {
                if (!confirm("ブロックしますか？（3日間そのユーザーからの要求を無視）")) return;
                // ブロック情報を保存
                const reportRef = ref(database, `bug_reports/${key}`);
                get(reportRef).then((snap) => {
                    const report = snap.val();
                    if (report) {
                        const blockedRef = ref(database, `bug_blocks/${report.userId}`);
                        set(blockedRef, { until: Date.now() + 3*24*60*60*1000 });
                        update(ref(database, `bug_reports/${key}`), { status: 'blocked' });
                        showCenterMessage('🚫 ブロックしました', '#ff6666');
                        this.loadMessages();

                const maxHand = window.battleState.playerHandSizeBoostTurns > 0 ? 7 : 5;
                const currentCount = window.battleState.hand.length;
                if (currentCount >= maxHand) { this.renderHand(); return; }
                const drawCount = maxHand - currentCount;
                const ownedCardIds = Object.keys(window.playerData.inventory);
                for(let i=0; i<drawCount; i++) {
                    let card = null;
                    if (window.playerData.equipped.length === 25) {
                        const randomIndex = Math.floor(Math.random() * window.playerData.equipped.length);
                        card = UIController.getCardById(window.playerData.equipped[randomIndex]);
                    } else if (ownedCardIds.length > 0) {
                        const randomId = ownedCardIds[Math.floor(Math.random() * ownedCardIds.length)];
                        card = UIController.getCardById(randomId);
                    } else {
                        const defaultCards = ALL_CARDS.filter(c => !c.id.startsWith("boss_") && (c.id === "c1" || c.id === "c3" || c.id === "c4"));
                        card = defaultCards[Math.floor(Math.random() * defaultCards.length)];

                if (!window.battleState.isActive || window.battleState.activeCard) return;
                if (!window.battleState.canSelectCard) { this.logBattle("⏳ まだカードを選べません！"); return; }
                if (window.battleState.playerFrozenTurns > 0) {
                    this.logBattle(`❄️ 凍っていて動けない！`);
                    window.battleState.playerFrozenTurns--;
                    window.battleState.canSelectCard = false;
                    setTimeout(() => this.enemyTurn(), 1000);
                    return;
                }
                window.battleState.canSelectCard = false;
                window.battleState.activeCard = window.battleState.hand[index];
                window.battleState.hand.splice(index, 1);
                this.fillHand();
                const word = TYPING_WORDS[Math.floor(Math.random() * TYPING_WORDS.length)];
                window.battleState.currentWord = word;
                window.battleState.typedIndex = 0;
                window.battleState.mistakes = 0;
                window.battleState.typingStartTime = performance.now();
                this.updateTypingUI();
                document.getElementById('typing-message').textContent = `⚡ 「${window.battleState.activeCard.name}」発動！`;

            updateTypingUI: function() {
                const word = window.battleState.currentWord;
                if (!word) return;
                document.getElementById('typing-ja').textContent = word.ja;
                const typedPart = word.en.substring(0, window.battleState.typedIndex);
                const remainingPart = word.en.substring(window.battleState.typedIndex);
                document.getElementById('typing-en').innerHTML = `<span class="typed">${typedPart}</span><span>${remainingPart}</span>`;
            },
            resetTypingUI: function() {
                document.getElementById('typing-message').textContent = "👇 下のカードから1つ選んでください";
                document.getElementById('typing-ja').textContent = "";
                document.getElementById('typing-en').innerHTML = "";
            },
            handleTyping: function(key) {
                if (!window.battleState.isActive || !window.battleState.activeCard || !window.battleState.currentWord) return;
                const targetChar = window.battleState.currentWord.en[window.battleState.typedIndex];
                if (key.toLowerCase() === targetChar.toLowerCase()) {
                    AudioController.playType();
                    window.battleState.typedIndex++;
                    this.updateTypingUI();
                    if (window.battleState.typedIndex >= window.battleState.currentWord.en.length) {
                        this.executeCardEffect();
                    }
                } else {
                    AudioController.playError();
                    window.battleState.mistakes++;
                    const enDiv = document.getElementById('typing-en');
                    enDiv.classList.add('error');
                    setTimeout(() => enDiv.classList.remove('error'), 100);
                }
            },
            executeCardEffect: function() {
                const card = window.battleState.activeCard;
                let logMsg = `🃏 【${card.name}】発動！ `;
                // 簡易効果（既存の効果は省略）
                this.logBattle(logMsg);
                this.updateHPUI();
                this.resetTypingUI();
                window.battleState.activeCard = null;
                window.battleState.canSelectCard = true;
                if (window.battleState.boss.hp <= 0) {
                    if (window.battleState.isBossBattle && window.battleState.boss.onDefeat) window.battleState.boss.onDefeat();

                    return;

                setTimeout(() => this.enemyTurn(), 1000);

            enemyTurn: function() {
                if (!window.battleState.isActive) return;
                let enemyDamage = window.battleState.boss.attack;
                if (window.battleState.playerShield > 0) {
                    if (window.battleState.playerShield >= enemyDamage) {
                        window.battleState.playerShield -= enemyDamage;
                        enemyDamage = 0;
                    } else {
                        enemyDamage -= window.battleState.playerShield;
                        window.battleState.playerShield = 0;
                    }
                }
                if (enemyDamage > 0) {
                    window.battleState.playerHp = Math.max(0, window.battleState.playerHp - enemyDamage);
                }
                this.logBattle(`👹 攻撃！ ${enemyDamage} ダメージ`);
                this.updateHPUI();
                if (window.battleState.playerHp <= 0) { this.endBattle(false, "HPが0になった..."); }
                window.battleState.canSelectCard = true;

                this.executeDraw(packAmount * 5, false);
            },
            drawAll: function() { if (window.playerData.packs > 0) this.drawCards(window.playerData.packs); },
            drawPremiumCards: function(premiumPackAmount) {
                const cost = premiumPackAmount * 5;

                window.playerData.packs -= cost;
                this.executeDraw(premiumPackAmount * 5, true);

            executeDraw: function(cardAmount, isPremium) {
                const results = [];
                for(let i=0; i<cardAmount; i++) {
                    const card = this.rollSingleCard(isPremium);
                    results.push(card);
                    if (window.playerData.inventory[card.id] === undefined) window.playerData.inventory[card.id] = 0;

            rollSingleCard: function(isPremium = false) {
                const rand = Math.random() * 100;
                let cumulative = 0;
                let selectedRarity = "Common";
                const weights = isPremium ? RARITY_WEIGHTS_PREMIUM : RARITY_WEIGHTS_NORMAL;
                for (const rw of weights) {
                    cumulative += rw.chance;
                    if (rand <= cumulative) { selectedRarity = rw.rarity; break; }
                }
                if (isPremium && (selectedRarity === "Common" || selectedRarity === "Uncommon")) selectedRarity = "Rare";
                let cardsOfRarity = ALL_CARDS.filter(c => c.rarity === selectedRarity && !c.id.startsWith("boss_") && !c.id.startsWith("story_") && !c.id.startsWith("craft_"));
                if (cardsOfRarity.length === 0) cardsOfRarity = ALL_CARDS.filter(c => c.rarity === "Rare" && !c.id.startsWith("boss_"));
                return cardsOfRarity[Math.floor(Math.random() * cardsOfRarity.length)];

                this.recipes.forEach(recipe => {
                    const resultCard = UIController.getCardById(recipe.resultCardId);
                    if (!resultCard) return;
                    let canCraft = true;
                    let requirementsHtml = '';
                    recipe.requirements.forEach(req => {
                        const owned = window.playerData.inventory[req.cardId] || 0;
                        const hasEnough = owned >= req.count;
                        if (!hasEnough) canCraft = false;
                        requirementsHtml += `<span style="color:${hasEnough?'#88ff88':'#ff8888'};">${req.name} x${req.count} (所持:${owned})</span> `;
                    });
                    container.innerHTML += `
                        <div class="craft-recipe">
                            <h3>${recipe.name}</h3>
                            <div class="craft-requirements">${requirementsHtml}</div>
                            <div class="craft-result">
                                ${UIController.createCardHTML(resultCard)}
                                <button class="btn-craft" ${canCraft ? `onclick="CraftController.craft('${recipe.id}')"` : 'disabled'}>🔨 クラフト</button>
                            </div>
                        </div>
                    `;
                });
            },
            craft: function(recipeId) {
                const recipe = this.recipes.find(r => r.id === recipeId);
                if (!recipe) return;
                for (const req of recipe.requirements) {
                    if ((window.playerData.inventory[req.cardId] || 0) < req.count) { alert("材料不足"); return; }
                }
                for (const req of recipe.requirements) {
                    window.playerData.inventory[req.cardId] -= req.count;
                    if (window.playerData.inventory[req.cardId] <= 0) delete window.playerData.inventory[req.cardId];
                }
                const resultCardId = recipe.resultCardId;
                if (!window.playerData.inventory[resultCardId]) window.playerData.inventory[resultCardId] = 0;
                window.playerData.inventory[resultCardId]++;
                GameDataManager.saveData();
                showCenterMessage(`🎉 ${UIController.getCardById(resultCardId).name} 作成！`, "#ffd700");
                this.renderScreen();
            }
        };

        // 既存のTradeControllerを置き換え（新システム）
        // 上で定義済み

        console.log('すべての機能が読み込まれました！');
    </script>
